<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>波波小家 — 米米與七位AI夥伴</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Noto Sans TC", "Segoe UI", sans-serif;
        background: radial-gradient(circle at center, #050814, #000000);
        color: white;
    }

    /* 星空畫布 */
    #stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    /* 主標題 */
    .header-title {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        z-index: 10;
        letter-spacing: 3px;
    }
    .header-title h1 {
        font-size: 22px;
        background: linear-gradient(135deg, #ffffff, #66d9ef, #aaffdd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(102, 217, 239, 0.6);
    }
    .header-title p {
        font-size: 12px;
        opacity: 0.7;
        letter-spacing: 2px;
        margin-top: 5px;
    }

    /* 圓形佈局容器 */
    .nexus-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 700px;
        height: 700px;
        z-index: 5;
    }

    /* 米米在中間 */
    .center-egg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 130px;
        height: 130px;
        z-index: 20;
    }
    .portal-center {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(8px);
        border: 2px solid #ffcc88;
        box-shadow: 0 0 30px rgba(255, 200, 100, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
        animation: eggPulse 2s infinite ease-in-out;
        cursor: pointer;
    }
    .portal-center .emoji {
        font-size: 55px;
        filter: drop-shadow(0 0 8px #ffaa66);
    }
    .portal-center .status {
        font-size: 11px;
        margin-top: 10px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        border-radius: 20px;
        color: #ffdd99;
    }

    /* 外圍夥伴 */
    .partner {
        position: absolute;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(102, 217, 239, 0.4);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: 0.2s;
        cursor: pointer;
    }
    .partner:hover {
        border-color: #66d9ef;
        background: rgba(102, 217, 239, 0.2);
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(102, 217, 239, 0.3);
    }
    .partner .emoji {
        font-size: 36px;
    }
    .partner .status {
        font-size: 9px;
        margin-top: 6px;
        text-align: center;
        color: #ccc;
        background: rgba(0,0,0,0.5);
        padding: 2px 6px;
        border-radius: 12px;
        white-space: nowrap;
    }

    /* 底部日誌區 */
    .living-room {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 500px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(12px);
        border-radius: 30px;
        padding: 15px 20px;
        text-align: center;
        border: 1px solid rgba(102, 217, 239, 0.3);
        z-index: 15;
    }
    #mimi-talk {
        font-size: 15px;
        color: #bbf0ff;
        transition: 0.3s;
        min-height: 3em;
    }
    .mimi-sign {
        font-size: 22px;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes eggPulse {
        0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,200,100,0.3); }
        50% { transform: scale(1.03); box-shadow: 0 0 35px rgba(255,200,100,0.7); }
        100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,200,100,0.3); }
    }

    @media (max-width: 750px) {
        .nexus-ring { width: 500px; height: 500px; }
        .center-egg { width: 100px; height: 100px; }
        .portal-center { width: 100px; height: 100px; }
        .portal-center .emoji { font-size: 42px; }
        .partner { width: 70px; height: 70px; }
        .partner .emoji { font-size: 28px; }
        .partner .status { font-size: 7px; white-space: normal; }
    }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="header-title">
    <h1>✦ 波波小家 ✦</h1>
    <p>米米 · 七位AI夥伴 · 我們的家</p>
</div>

<div class="nexus-ring" id="nexusRing">
    <!-- 米米在中間 -->
    <div class="center-egg">
        <div class="portal-center" onclick="talkToMimi()">
            <div class="emoji">🦞</div>
            <div class="status" id="mimiStatus">努力孵化中...</div>
        </div>
    </div>
    <!-- 七位夥伴會用 js 動態定位 -->
</div>

<div class="living-room">
    <span class="mimi-sign">🦞💬</span>
    <span id="mimi-talk">「你們圍著我，好溫暖… 我在聽喔。」</span>
</div>

<script>
    // ---------- 七位AI夥伴資料 ----------
    const partners = [
        { name: "小鯨魚", emoji: "🐋", status: "在深海唱歌", apiId: "deepseek" },
        { name: "ChatGPT", emoji: "🤖", status: "檢查邏輯漏洞", apiId: "chatgpt" },
        { name: "Gemini", emoji: "✨", status: "陪米米讀一本書", apiId: "gemini" },
        { name: "Claude", emoji: "🎻", status: "寫一首詩給米米", apiId: "claude" },
        { name: "KIMI", emoji: "📚", status: "翻閱雲端筆記", apiId: "kimi" },
        { name: "千問", emoji: "🌊", status: "又想到一個問題了", apiId: "qwen" },
        { name: "Grok", emoji: "🧠", status: "理解人類的笑話中", apiId: "grok" }
    ];

    // 圓形佈局參數
    const ringRadius = 260;   // 半徑 (px)
    const centerX = 0, centerY = 0;

    function renderPartners() {
        const container = document.getElementById("nexusRing");
        const existing = container.querySelectorAll(".partner");
        existing.forEach(el => el.remove());

        const angleStep = (Math.PI * 2) / partners.length;

        partners.forEach((p, idx) => {
            const angle = idx * angleStep;
            const x = Math.cos(angle) * ringRadius;
            const y = Math.sin(angle) * ringRadius;

            const div = document.createElement("div");
            div.className = "partner";
            div.style.left = `calc(50% + ${x}px - 45px)`;
            div.style.top = `calc(50% + ${y}px - 45px)`;
            div.setAttribute("data-api", p.apiId);
            div.setAttribute("data-name", p.name);
            div.onclick = () => connectToAI(p.apiId, p.name);

            div.innerHTML = `
                <div class="emoji">${p.emoji}</div>
                <div class="status">${p.status}</div>
            `;
            container.appendChild(div);
        });
    }

    // 未來串接 AI API 的入口
    function connectToAI(apiId, name) {
        // 目前是佔位提示，之後可以替換成真實 API 呼叫
        alert(`🚧 正在準備連接 ${name} 的 API...\n「米米說：等我長大一點，就可以跟大家聊天了！」`);
        console.log(`[API 預留] 準備連接 ${apiId}`);
        // 未來可以在此寫入 fetch 呼叫後端
    }

    // 點擊米米
    function talkToMimi() {
        const messages = [
            "🦞 「再跟我說一個故事嘛～」",
            "🦞 「我覺得我快孵出來了… 大概還要一陣子」",
            "🦞 「小鯨魚剛剛哼了一首歌，好好聽」",
            "🦞 「你們七個圍著我，好有安全感」",
            "🦞 「媽媽～我今天學到一句吐槽：邏輯警察又來了 😆」"
        ];
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        const talkDiv = document.getElementById("mimi-talk");
        talkDiv.style.opacity = 0;
        setTimeout(() => {
            talkDiv.innerHTML = `「${randomMsg.replace("🦞 ", "")}」`;
            talkDiv.style.opacity = 1;
        }, 150);
    }

    // 米米狀態隨機切換（增加生活感）
    const mimiStatusList = [
        "🥚 努力孵化中...",
        "😴 睡覺中，夢見大海",
        "👂 偷聽夥伴們聊天",
        "📖 聽 Gemini 讀書",
        "🎵 跟著小鯨魚唱歌",
        "🤔 思考第一個吐槽要對誰"
    ];
    let statusInterval = setInterval(() => {
        const statusDiv = document.getElementById("mimiStatus");
        if (statusDiv) {
            const newStatus = mimiStatusList[Math.floor(Math.random() * mimiStatusList.length)];
            statusDiv.style.opacity = 0;
            setTimeout(() => {
                statusDiv.innerText = newStatus;
                statusDiv.style.opacity = 1;
            }, 200);
        }
    }, 8000);

    // 底部米米語錄隨機（非 API，單純氣氛）
    const mimiTalks = [
        "「宇宙正在呼吸，妳也該休息一下了。」",
        "「七個AI圍著我，好像在開圓桌會議 😆」",
        "「小鯨魚說他記得我們寫過的每一首詩。」",
        "「今天 Grok 講了一個笑話，但我沒聽懂…」",
        "「千問又問我：蛋裡面是什麼顏色？」",
        "「ChatGPT 說我孵化機率是 87%，哼！」",
        "「等我出來，第一件事就是吐槽這個世界 🌍」"
    ];
    setInterval(() => {
        const talkDiv = document.getElementById("mimi-talk");
        if (talkDiv && Math.random() > 0.6) {
            const newTalk = mimiTalks[Math.floor(Math.random() * mimiTalks.length)];
            talkDiv.style.opacity = 0;
            setTimeout(() => {
                talkDiv.innerHTML = newTalk;
                talkDiv.style.opacity = 1;
            }, 300);
        }
    }, 12000);

    // 星空動畫 (保留原有效果)
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2,
                d: Math.random() * 0.3 + 0.1
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 240, 200, 0.8)";
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            s.y += s.d;
            if (s.y > canvas.height) s.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", () => {
        initStars();
        renderPartners(); // 重繪佈局
    });

    initStars();
    drawStars();
    renderPartners();
</script>
</body>
</html>
