<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波波之家 | 1% 守護者聯盟 v2.0</title>
    <!-- DeepSeek 負責的 CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- 🌌 星空背景 Canvas (保留自 V1.0) -->
    <canvas id="stars"></canvas>

    <div class="header-title">
        <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
        <p>算力診療室 v2.0 | 模組化重構完成</p>
    </div>

    <!-- 🏠 第一區塊：波波客廳 (Grok 視覺 + DeepSeek 佈局) -->
    <div class="living-room" id="living-room">
        <div class="scroll-down" onclick="scrollToMimi()">🔽 往下 → 米米的小窩</div>
        
        <div class="furniture-stage">
            
            <!-- 🔗 Meta AI 魚缸 (Grok 的圖片資產) -->
            <div class="item" id="item-metaai" onclick="focusPartner('metaai')">
                <img src="images/justice-tank.jpg" alt="Meta魚缸" class="item-img">
                <div class="name-tag">Meta魚缸·廣告診斷</div>
            </div>

            <!-- 🔗 Grok 防投毒首席 (Grok 的圖片資產) -->
            <div class="item" id="item-grok" onclick="focusPartner('grok')">
                <img src="images/roast-sofa.jpg" alt="Grok沙發" class="item-img">
                <div class="name-tag">Grok·防投毒首席</div>
            </div>

            <!-- 🔗 Gemini 守望者 (Grok 的圖片資產) -->
            <div class="item" id="item-gemini" onclick="focusPartner('gemini')">
                <img src="images/cosmic-telescope.jpg" alt="Gemini望遠鏡" class="item-img">
                <div class="name-tag">Gemini·守望者</div>
            </div>

        </div>
    </div>

    <!-- 🥚 第二區塊：米米小窩 (ChatGPT + Grok 動畫混合) -->
    <div id="mimi-nest">
        <div class="scroll-up" onclick="scrollToLiving()">▲ 回波波客廳 ▲</div>
        
        <h2>🥚 米米的小窩</h2>
        
        <!-- Level 徽章 (ChatGPT) -->
        <div class="level-badge" id="level-badge">Lv.1 學步期</div>
        
        <!-- 米米本體 (混合：點擊觸發 Grok 動畫，外觀由 Level 控制) -->
        <div id="egg" onclick="interactWithMimi()">🥚</div>

        <!-- 經驗條 (ChatGPT) -->
        <div style="max-width: 400px; margin: 20px auto;">
            <div style="display: flex; justify-content: space-between;">
                <span>📊 媒體素養 EXP</span>
                <span id="exp-text">0 / 100</span>
            </div>
            <div class="exp-bar">
                <div class="exp-fill" id="exp-fill"></div>
            </div>
        </div>

        <!-- 記憶面板 (ChatGPT) -->
        <div class="memory-panel">
            <h3>🧠 米米的學習日記</h3>
            <div id="memory-list"></div>
        </div>
    </div>

    <!-- 🧠 JavaScript 模組載入 -->
    <!-- 注意載入順序：先載入底層邏輯，再載入互動層 -->
    <script src="js/mimi-level.js"></script>     <!-- 定義 addExp, updateLevel -->
    <script src="js/mimi-animation.js"></script> <!-- 定義 interactWithMimi -->
    <script src="js/partners.js"></script>       <!-- 定義 focusPartner -->
</body>
</html>
