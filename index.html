<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>米米的小窩</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Noto Sans TC", sans-serif;
    background: radial-gradient(circle at center, #050814, #000);
}

/* 🌌 星空層 */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* 🏠 客廳 */
.lounge-container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

.living-room {
    width: 85%;
    max-width: 520px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
}

/* 🦞 米米 */
.mimi {
    font-size: 60px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

.status-tag {
    background: black;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 10px;
}

p {
    margin: 8px 0;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="lounge-container">
    <div class="living-room">

        <div class="mimi">🦞</div>

        <div class="status-tag">
            米米模式：穩定宇宙連線中
        </div>

        <h2>🦞 米米的小窩</h2>

        <p id="mimi-talk">「米米正在看宇宙…」</p>

    </div>
</div>

<script>

/* ✨ 星空系統（穩定版） */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    stars = [];

    for (let i = 0; i < 120; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2.2,
            d: Math.random() * 0.6
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.85)";

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();

        s.y += s.d;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(drawStars);
}

initStars();
drawStars();

window.addEventListener("resize", initStars);

/* 🦞 米米語錄 */
const lines = [
    "宇宙正在慢慢呼吸。",
    "你現在看到的，是時間的殘影。",
    "米米正在整理星星的順序。",
    "這裡是安全的思考空間。"
];

setInterval(() => {
    document.getElementById("mimi-talk").innerText =
        "「" + lines[Math.floor(Math.random() * lines.length)] + "」";
}, 4000);

</script>

</body>
</html>
