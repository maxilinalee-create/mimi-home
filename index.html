<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v15.0</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
        width:100%; height:100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color:#eef;
        font-family:"Noto Sans TC", sans-serif;
        overflow-x:hidden;
    }
    #stars {
        position:fixed; top:0; left:0;
        width:100%; height:100%; z-index:0; pointer-events:none;
    }
    .header-title {
        position: absolute; /* ✅ 改為 absolute，不會蓋住米米 */
        top:25px;
        width:100%;
        text-align:center;
        z-index:100;
        pointer-events: none;
    }
    .header-title h1 {
        font-size:26px;
        background:linear-gradient(135deg,#fff,#88ddff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    .header-title p { font-size:11px; opacity:0.7; margin-top:5px; }

    /* 第一層：客廳 */
    .living-room {
        position:relative;
        width:100vw;
        min-height:100vh;
        z-index:10;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        padding:120px 20px 60px;
    }
    .furniture-stage {
        display:flex;
        gap:30px;
        flex-wrap:wrap;
        justify-content:center;
        align-items:flex-end;
        max-width: 1200px;
    }
    .item {
        cursor:pointer;
        text-align:center;
        width:150px;
        transition:0.4s;
    }
    .item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.65);
        transition: all 0.3s ease;
        border: 2px solid rgba(136,221,255,0.3);
    }
    .item:hover img {
        transform:scale(1.05);
        border-color: #88ddff;
        box-shadow:0 0 30px rgba(136,221,255,0.5);
    }
    .item.active img {
        border-color: #ffaa66;
        box-shadow: 0 0 35px rgba(255,170,102,0.6);
    }
    .name-tag {
        margin-top:10px;
        padding:5px 10px;
        background:rgba(0,0,0,0.8);
        border-radius:20px;
        font-size:11px;
        backdrop-filter: blur(5px);
        white-space: nowrap;
        overflow-x: auto;
        max-width: 100%;
    }

    /* 第二層：投票牆 + 辯論區 */
    #vote-room {
        min-height:100vh;
        padding:80px 20px;
        background: radial-gradient(circle at center, #0a1428, #03060c);
        border-top: 3px solid rgba(136,221,255,0.3);
        border-bottom: 3px solid rgba(255,200,100,0.3);
    }
    .vote-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        max-width: 1000px;
        margin: 30px auto;
    }
    .vote-card {
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 15px;
        width: 150px;
        text-align: center;
        border-left: 4px solid #ffaa66;
        transition: all 0.3s;
    }
    .vote-card.violation { border-left-color: #ff6666; }
    .vote-card.gray { border-left-color: #ffaa66; }
    .vote-card.compliant { border-left-color: #66ffcc; }
    .vote-card h4 { margin-bottom: 8px; font-size: 16px; }
    .vote-card .result { font-size: 20px; font-weight: bold; margin: 8px 0; }
    .vote-card .evidence { font-size: 11px; opacity: 0.7; margin-top: 8px; }

    .debate-area {
        max-width: 800px;
        margin: 30px auto;
        background: rgba(0,0,0,0.5);
        border-radius: 20px;
        padding: 20px;
    }
    .debate-line {
        padding: 12px 15px;
        margin: 8px 0;
        background: rgba(0,0,0,0.6);
        border-radius: 12px;
        border-left: 3px solid #ffaa66;
        font-size: 14px;
    }
    .debate-evidence {
        border-left-color: #66ccff;
        background: rgba(102,204,255,0.1);
    }
    .debate-system {
        border-left-color: #ffaa66;
        background: rgba(255,170,102,0.1);
        font-style: italic;
    }
    .round-badge {
        display: inline-block;
        background: #ffaa66;
        color: #1a1a2a;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    /* 第三層：米米小窩 */
    #mimi-nest {
        min-height:100vh;
        padding:100px 20px;
        text-align:center;
        background:radial-gradient(circle at center,#1a1208,#020408);
    }
    #egg-container {
        cursor: pointer;
        display: inline-block;
        transition: all 0.6s ease;
    }
    #egg-container img {
        max-width: 280px;
        width: 100%;
        border-radius: 30px;
        filter: drop-shadow(0 0 20px rgba(255,170,102,0.5));
    }
    #bite-animation {
        position: fixed;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        pointer-events: none;
        display: none;
    }
    #bite-animation img {
        max-width: 200px;
        animation: biteAnim 0.8s ease-out forwards;
    }
    @keyframes biteAnim {
        0% { transform: scale(0.8) rotate(-15deg); opacity: 0; }
        20% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        60% { transform: scale(1) rotate(-5deg); }
        100% { transform: scale(0.9) rotate(0deg); opacity: 0; }
    }
    .level-badge {
        display: inline-block;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        padding: 8px 24px;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        margin: 15px 0;
        color: #1a1a2a;
    }
    .exp-bar {
        max-width: 400px;
        margin: 20px auto;
        height: 12px;
        background: rgba(255,200,100,0.2);
        border-radius: 20px;
        overflow: hidden;
    }
    .exp-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffaa66, #ff8866);
        width: 0%;
        transition: width 0.5s ease;
    }
    .feed-area {
        margin-top: 25px;
        padding: 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 20px;
        border: 1px dashed #ffaa66;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }
    .feed-area textarea {
        width: 100%;
        height: 80px;
        border-radius: 15px;
        padding: 12px;
        background: #111;
        color: #fff;
        border: 1px solid #ffaa66;
        font-size: 14px;
        resize: vertical;
    }
    .feed-btn {
        margin-top: 12px;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        border: none;
        padding: 10px 24px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        color: #1a1a2a;
    }
    .memory-panel {
        max-width:800px;
        margin:30px auto;
        background:rgba(0,0,0,0.7);
        padding:25px;
        border-radius:25px;
        text-align:left;
    }
    .memory-item {
        margin:12px 0;
        padding: 8px 12px;
        background: rgba(255,200,100,0.1);
        border-radius: 15px;
        border-left: 3px solid #ffaa66;
    }
    .scroll-down, .scroll-up {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: #ffdd99;
        cursor: pointer;
        animation: pulse 2s infinite;
    }
    .scroll-down { bottom: 30px; }
    .scroll-up { top: 30px; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    @media (max-width: 768px) {
        .item { width: 110px; }
        .item img { height: 110px; }
        .vote-card { width: 130px; }
        .name-tag { font-size: 9px; white-space: normal; }
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v15.0 | 三輪辯論 · AI可能被說服 · 人類裁決</p>
</div>

<!-- 第一層：客廳 -->
<div class="living-room" id="living-room">
    <div class="scroll-down" onclick="scrollToVote()">🗳️ 往下 → AI 投票牆 ▼</div>
    <div class="furniture-stage">
        <div class="item" id="item-metaai" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸</div>
        </div>
        <div class="item" id="item-grok" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok</div>
        </div>
        <div class="item" id="item-gemini" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">

        </div>
        <div class="item" id="item-deepseek" onclick="focusPartner('deepseek')">

            <div class="name-tag">DeepSeek</div>
        </div>
        <div class="item" id="item-qwen" onclick="focusPartner('qwen')">
            <img src="qwen-corner.png" alt="千問角落">
            <div class="name-tag">千問</div>
        </div>
        <div class="item" id="item-chatgpt" onclick="focusPartner('chatgpt')">

        </div>

</div>

<!-- 第二層：投票牆 + 三輪辯論區 -->
<div id="vote-room">
    <div class="scroll-up" onclick="scrollToLiving()">▲ 回波波客廳 ▲</div>
    <div class="scroll-down" onclick="scrollToMimi()">🥚 往下 → 米米的小窩 ▼</div>
    
    <h2 style="text-align:center; color:#88ddff; margin-bottom:20px;">🗳️ AI 投票決議牆</h2>
    <div id="vote-grid" class="vote-grid"></div>
    
    <div id="debate-area" class="debate-area" style="display:none;">
        <div id="round-badge" class="round-badge"></div>
        <div id="debate-log"></div>
        <div id="human-vote-area" style="margin-top:20px; text-align:center; display:none;">
            <button onclick="humanVote('違規 ❌')" style="background:#ff6666; border:none; padding:8px 20px; border-radius:30px; margin:5px; cursor:pointer;">❌ 違規</button>
            <button onclick="humanVote('灰區 ⚠️')" style="background:#ffaa66; border:none; padding:8px 20px; border-radius:30px; margin:5px; cursor:pointer;">⚠️ 灰區</button>
            <button onclick="humanVote('合規 ✅')" style="background:#66ffcc; border:none; padding:8px 20px; border-radius:30px; margin:5px; cursor:pointer;">✅ 合規</button>

</div>

<!-- 第三層：米米小窩 -->
<div id="mimi-nest">
    <div class="scroll-up" onclick="scrollToVote()">▲ 回 AI 投票牆 ▲</div>
    
    <h2 style="color:#ffdd99; font-size:42px; margin-bottom:15px;">🥚 米米的小窩</h2>
    
    <div id="egg-container" onclick="crackMimiEgg()">
        <img id="mimi-img" src="mimi-lobster-hatch.png" alt="米米蛋">
    </div>
    
    <div id="bite-animation">
        <img id="bite-img" src="" alt="米米咬廣告">
    </div>
    
    <div class="level-badge" id="level-badge">Lv.1 學步期</div>
    <div id="mimi-status" style="font-size:16px; color:#ffcc77;">EXP 0 / 100</div>
    <div class="exp-bar"><div class="exp-fill" id="exp-fill"></div></div>
    <div style="margin-top:10px; font-size:18px; color:#aaffcc;">💰 米米資金：<span id="money-display">0</span> 元</div>
    
    <div class="feed-area">
        <textarea id="ad-input" placeholder="把你看到的廣告貼給米米...&#10;例如：7天淡斑！醫師推薦！限量最後3小時！"></textarea>
        <button class="feed-btn" onclick="startTrial()">⚖️ 啟動三輪辯論</button>
    </div>
    
    <div class="memory-panel">
        <h3 style="color:#ffaa66;">🧠 米米學習日記</h3>
        <div id="memory-list"></div>
        <button onclick="clearMemory()" style="margin-top:15px; background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer;">🗑️ 清除記憶</button>
    </div>
</div>

<script>
/* ============================================
   🐚 波波之家 v15.0 - 三輪辯論系統
   偶數AI + 平手觸發事實辯論 + 人類裁決
   ============================================ */

// ---------- 星空背景 ----------
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];
function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}
function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}
window.addEventListener("resize", initStars);
initStars();
drawStars();

// ---------- 樓層切換 ----------
function scrollToLiving() { document.getElementById('living-room').scrollIntoView({ behavior: 'smooth' }); }
function scrollToVote() { document.getElementById('vote-room').scrollIntoView({ behavior: 'smooth' }); }
function scrollToMimi() { document.getElementById('mimi-nest').scrollIntoView({ behavior: 'smooth' }); }

// ---------- 米米系統 ----------
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');
let hasHatched = localStorage.getItem('mimi_hatched') === 'true';
let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');

const levelSystem = { 1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期", 5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期" };
const levelSkills = {
    1: "單一AI回應學習", 2: "多AI基礎投票", 3: "API故障切換",
    4: "Gacha決策系統", 5: "分歧偵測", 6: "圖像生成委派", 7: "完整編排+共識記憶"
};

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 40) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}
function renderMemory() {
    const container = document.getElementById('memory-list');
    if (!container) return;
    if (mimiMemory.length === 0) { container.innerHTML = '<div>還沒有記憶...貼廣告啟動三輪辯論吧！</div>'; return; }
    let html = '';
    mimiMemory.forEach(m => { html += `<div class="memory-item"><span class="memory-time">${m.time}</span> ${m.msg}</div>`; });
    container.innerHTML = html;
}
function clearMemory() { mimiMemory = []; localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory)); renderMemory(); saveMemory('🧹 記憶已清除'); }

function crackMimiEgg() {
    const mimiImg = document.getElementById('mimi-img');
    if (!mimiImg) return;
    if (hasHatched) { mimiImg.src = "mimi-lobster-ready.png"; saveMemory('🦞 米米開心地看著你'); return; }
    mimiImg.style.transition = 'all 0.5s ease';
    mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
    mimiImg.src = "mimi-lobster-hatch.png";
    setTimeout(() => {
        mimiImg.src = "mimi-lobster-ready.png";
        mimiImg.style.transform = 'scale(1.05) rotate(-5deg)';
        setTimeout(() => { mimiImg.style.transform = 'scale(1) rotate(0deg)'; }, 400);
        hasHatched = true;
        localStorage.setItem('mimi_hatched', 'true');
        saveMemory('🥚✨ 米米破殼了！');
        addEXP(15);
    }, 600);
}

function playBiteAnimation(adText) {
    const biteDiv = document.getElementById('bite-animation');
    const biteImg = document.getElementById('bite-img');
    biteImg.src = "mimi-bite-ad.gif";
    biteDiv.style.display = 'block';
    setTimeout(() => { biteDiv.style.display = 'none'; }, 800);
    saveMemory(`🦞 米米咬掉廣告：「${adText.substring(0, 40)}...」`);
}

function updateUI() {
    const badge = document.getElementById('level-badge');
    const status = document.getElementById('mimi-status');
    const expFill = document.getElementById('exp-fill');
    const moneyDisplay = document.getElementById('money-display');
    if (badge) badge.innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
    if (status) status.innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
    if (moneyDisplay) moneyDisplay.innerText = mimiMoney;
    const percent = (exp / (currentLevel * 100)) * 100;
    if (expFill) expFill.style.width = Math.min(100, percent) + '%';
}

function setLevel(lv) {
    currentLevel = lv;
    localStorage.setItem('mimi_level', lv);
    updateUI();
    saveMemory(`✨ 米米升級！LEVEL ${lv} - ${levelSystem[lv]}，解鎖「${levelSkills[lv]}」`);
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現AI意見分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) { exp = exp - targetExp; setLevel(currentLevel + 1); localStorage.setItem('mimi_exp', exp); }
    updateUI();
}

// ---------- 三輪辯論系統核心 ----------
let currentAdText = "";
let currentAIs = [];
let currentRound = 1;
let humanVoteCallback = null;

// 6 位 AI 夥伴（偶數）
const AI_PARTNERS = [
    { name: "Meta魚缸", avatar: "🐠", stance: "", evidence: "", line: "" },
    { name: "Grok", avatar: "🧠", stance: "", evidence: "", line: "" },
    { name: "Gemini", avatar: "🔭", stance: "", evidence: "", line: "" },
    { name: "DeepSeek", avatar: "🐋", stance: "", evidence: "", line: "" },
    { name: "千問", avatar: "🌊", stance: "", evidence: "", line: "" },
    { name: "ChatGPT", avatar: "🤖", stance: "", evidence: "", line: "" }
];

// 第一輪：AI 初判（根據廣告文字決定立場）
function round1Init(adText) {
    const hasViolation = /保證|100%|立即見效|三天|醫師推薦|治療|根治|神效|奇蹟/.test(adText);
    const hasGray = /限量|最後|不買就沒了|限時|倒數/.test(adText);
    
    return AI_PARTNERS.map(ai => {
        let stance, evidence, line;
        
        if (ai.name === "Grok") {
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "廣告法第21條：化粧品不得宣稱療效";
            line = hasViolation ? "這廣告太扯了！三天見效？騙誰啊！" : "有點可疑，但還沒到爆炸等級";
        } else if (ai.name === "Gemini") {
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "風險模型分析：該詞彙歷史違規率高達78%";
            line = hasViolation ? "從風險模型來看，這是高危訊號" : "數據顯示尚在合理範圍";
        } else if (ai.name === "DeepSeek") {
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "歷史裁罰案例：類似用詞已被裁罰12件";
            line = "根據檔案記錄，此類廣告高度違規";
        } else if (ai.name === "千問") {
            stance = hasViolation ? "灰區 ⚠️" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "語意分析：用詞可能為誇飾，需更多證據";
            line = "語意上略有誇張，但需更多證據";
        } else if (ai.name === "ChatGPT") {
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "邏輯推論：存在過度推論問題，可能誤導消費者";
            line = "邏輯上存在過度推論問題";
        } else { // Meta魚缸
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");
            evidence = "廣告規範第8條：療效宣稱需有科學證明";
            line = "依廣告規範，療效需可證明";
        }
        
        return { ...ai, stance, evidence, line };
    });
}

// 檢查是否平手
function checkTie(aiList) {
    const count = { "違規 ❌": 0, "灰區 ⚠️": 0, "合規 ✅": 0 };
    aiList.forEach(ai => count[ai.stance]++);
    const values = Object.values(count);
    // 偶數 AI，平手 = 最多票數的兩個陣營票數相同
    const sorted = [...values].sort((a,b) => b - a);
    return sorted[0] === sorted[1];
}

// 渲染投票牆
function renderVotes(aiList) {
    const container = document.getElementById('vote-grid');
    let html = '';
    aiList.forEach(ai => {
        let cardClass = '';
        if (ai.stance === '違規 ❌') cardClass = 'violation';
        else if (ai.stance === '灰區 ⚠️') cardClass = 'gray';
        else cardClass = 'compliant';
        html += `
            <div class="vote-card ${cardClass}">
                <h4>${ai.avatar} ${ai.name}</h4>
                <div class="result">${ai.stance}</div>
                <div class="evidence">📜 ${ai.evidence.substring(0, 40)}...</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// 渲染辯論區
function renderDebateLog(logs, round) {
    const debateArea = document.getElementById('debate-area');
    const roundBadge = document.getElementById('round-badge');
    const debateLog = document.getElementById('debate-log');
    
    debateArea.style.display = 'block';
    roundBadge.innerHTML = round === 1 ? '🥇 第一輪：AI 初判' : (round === 2 ? '🥈 第二輪：事實辯論' : '🥉 第三輪：人類裁決');
    
    let html = '';
    logs.forEach(log => {
        let cls = 'debate-line';
        if (log.type === 'evidence') cls += ' debate-evidence';
        if (log.type === 'system') cls += ' debate-system';
        html += `<div class="${cls}">${log.text}</div>`;
    });
    debateLog.innerHTML = html;
}

// 第二輪：事實辯論（引用法規、案例）
function runFactDebate(aiList, adText) {
    const logs = [];
    logs.push({ type: "system", text: "⚖️ 進入第二輪：事實辯論（依據法規、案例、新聞裁罰）" });
    
    aiList.forEach(ai => {
        logs.push({ type: "evidence", text: `${ai.avatar} ${ai.name} 提出證據：${ai.evidence}` });
    });
    
    // 模擬 AI 被說服（50% 機率改變立場為違規）
    const newAiList = aiList.map(ai => {
        if (Math.random() > 0.5 && ai.stance !== '違規 ❌') {
            logs.push({ type: "evidence", text: `✨ ${ai.name} 被說服了！改為「違規 ❌」` });
            return { ...ai, stance: '違規 ❌', line: `經過辯論，我認為此廣告確實違規。${ai.evidence}` };
        }
        return ai;
    });
    
    return { logs, newAiList };
}
