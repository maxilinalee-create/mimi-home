<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>米米的小窩</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1b2a4a, #050814);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .ball {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6ec1ff, #1b4cff);
      box-shadow: 0 0 40px #4aa3ff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .ball:hover {
      transform: scale(1.1);
      box-shadow: 0 0 80px #6ec1ff;
    }

    .title {
      position: absolute;
      top: 60px;
      text-align: center;
    }

    .subtitle {
      position: absolute;
      bottom: 60px;
      text-align: center;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="title">
    <h1>米米的小窩</h1>
  </div>

  <div class="ball">
    進入客廳
  </div>

  <div class="subtitle">
    這是一個將現實轉換為能量的空間
  </div>

</body>
</html>
