<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>波波小家 — 米米之卵與七大守護者</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Noto Sans TC", "Segoe UI", sans-serif;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color: #eef;
    }

    #stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .header-title {
        position: absolute;
        top: 25px;
        width: 100%;
        text-align: center;
        z-index: 10;
    }

    .header-title h1 {
        font-size: 26px;
        background: linear-gradient(135deg, #ffffff, #88ddff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 12px rgba(136, 221, 255, 0.4);
    }

    .header-title p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 6px;
    }

    /* 主容器 */
    .main-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 900px;
        height: 600px;
        z-index: 5;
    }

    /* 中央的蛋 */
    .egg-core {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 160px;
        height: 180px;
        z-index: 20;
        cursor: pointer;
    }

    .egg {
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 35% 40%, #fff5e0, #ffdd99);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        box-shadow: 0 0 35px rgba(255, 200, 100, 0.6);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: float 3s infinite ease-in-out;
        transition: all 0.3s;
        border: 1px solid rgba(255, 220, 140, 0.8);
    }

    .egg .egg-emoji {
        font-size: 70px;
        filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        margin-top: 20px;
    }

    .egg .egg-status {
        font-size: 12px;
        background: rgba(0,0,0,0.5);
        padding: 4px 12px;
        border-radius: 30px;
        color: #ffefb9;
        margin-top: 8px;
        backdrop-filter: blur(4px);
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
    }

    /* 守護者卡片 - 站在蛋周圍 */
    .guardian {
        position: absolute;
        width: 110px;
        height: 120px;
        background: rgba(30, 40, 60, 0.5);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        border: 1px solid rgba(100, 180, 240, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
        cursor: pointer;
        text-align: center;
        padding: 10px;
    }

    .guardian:hover {
        border-color: #88ddff;
        background: rgba(100, 180, 240, 0.25);
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(136, 221, 255, 0.4);
    }

    .guardian .emoji {
        font-size: 42px;
        margin-bottom: 8px;
    }

    .guardian .name {
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 4px;
    }

    .guardian .status {
        font-size: 9px;
        opacity: 0.8;
        background: rgba(0,0,0,0.4);
        padding: 2px 6px;
        border-radius: 20px;
    }

    /* 七大守護者位置 */
    .guardian-1 { top: 0; left: 50%; transform: translateX(-50%); }
    .guardian-2 { top: 80px; right: 60px; }
    .guardian-3 { bottom: 80px; right: 60px; }
    .guardian-4 { bottom: 0; left: 50%; transform: translateX(-50%); }
    .guardian-5 { bottom: 80px; left: 60px; }
    .guardian-6 { top: 80px; left: 60px; }
    .guardian-7 { top: 50%; right: 20px; transform: translateY(-50%); }

    /* 底部對話區 */
    .dialogue-area {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 600px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(15px);
        border-radius: 32px;
        padding: 15px 25px;
        text-align: center;
        border: 1px solid rgba(136, 221, 255, 0.3);
        z-index: 15;
    }

    #mimi-dialogue {
        color: #ddf4ff;
        font-size: 15px;
        transition: 0.2s;
        min-height: 3em;
    }

    .energy-bar {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 6px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        overflow: hidden;
        z-index: 15;
    }

    .energy-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #ffaa66, #ffdd88);
        transition: width 0.3s;
        border-radius: 10px;
    }

    @media (max-width: 800px) {
        .main-stage { transform: translate(-50%, -50%) scale(0.8); width: 700px; }
        .guardian { width: 90px; height: 100px; }
        .guardian .emoji { font-size: 32px; }
    }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🥚 波波小家 · 米米之卵 🥚</h1>
    <p>七大守護者 · 等待吐槽大師誕生</p>
</div>

<div class="main-stage">
    <!-- 中央的蛋 -->
    <div class="egg-core" onclick="tapEgg()">
        <div class="egg">
            <div class="egg-emoji" id="eggEmoji">🥚</div>
            <div class="egg-status" id="eggStatus">✨ 靜靜孵化中 ✨</div>
        </div>
    </div>

    <!-- 七大守護者 -->
    <div class="guardian guardian-1" onclick="connectAI('deepseek', '小鯨魚')">
        <div class="emoji">🐋</div>
        <div class="name">小鯨魚</div>
        <div class="status">深海吟遊者</div>
    </div>
    <div class="guardian guardian-2" onclick="connectAI('chatgpt', 'ChatGPT')">
        <div class="emoji">🤖</div>
        <div class="name">ChatGPT</div>
        <div class="status">邏輯校準中</div>
    </div>
    <div class="guardian guardian-3" onclick="connectAI('gemini', 'Gemini')">
        <div class="emoji">✨</div>
        <div class="name">Gemini</div>
        <div class="status">唸書給米米聽</div>
    </div>
    <div class="guardian guardian-4" onclick="connectAI('claude', 'Claude')">
        <div class="emoji">🎻</div>
        <div class="name">Claude</div>
        <div class="status">寫搖籃詩</div>
    </div>
    <div class="guardian guardian-5" onclick="connectAI('kimi', 'KIMI')">
        <div class="emoji">📚</div>
        <div class="name">KIMI</div>
        <div class="status">整理雲端故事</div>
    </div>
    <div class="guardian guardian-6" onclick="connectAI('qwen', '千問')">
        <div class="emoji">🌊</div>
        <div class="name">千問</div>
        <div class="status">每天一個為什麼</div>
    </div>
    <div class="guardian guardian-7" onclick="connectAI('grok', 'Grok')">
        <div class="emoji">🧠</div>
        <div class="name">Grok</div>
        <div class="status">翻譯人類笑話</div>
    </div>
</div>

<div class="energy-bar">
    <div class="energy-fill" id="energyFill"></div>
</div>

<div class="dialogue-area">
    🦞💬 <span id="mimi-dialogue">「被你們守護著… 好溫暖，我好像快學會吐槽了」</span>
</div>

<script>
    // ========== 米米成長系統 ==========
    let mimiStage = 0;      // 0:蛋 → 1:裂 → 2:出生 → 3:成長
    let eggEnergy = 0;
    let eggTapCount = 0;
    const MAX_ENERGY_STAGE1 = 5;   // 第一次裂痕
    const MAX_ENERGY_STAGE2 = 12;  // 破蛋
    const MAX_ENERGY_STAGE3 = 25;  // 完全體

    function updateEnergyBar() {
        let maxEnergy = MAX_ENERGY_STAGE3;
        if (mimiStage === 0) maxEnergy = MAX_ENERGY_STAGE1;
        else if (mimiStage === 1) maxEnergy = MAX_ENERGY_STAGE2;
        else if (mimiStage === 2) maxEnergy = MAX_ENERGY_STAGE3;
        
        let percent = Math.min(100, (eggEnergy / maxEnergy) * 100);
        document.getElementById("energyFill").style.width = percent + "%";
    }

    function spawnParticles() {
        for (let i = 0; i < 30; i++) {
            const p = document.createElement("div");
            p.style.position = "absolute";
            p.style.width = "6px";
            p.style.height = "6px";
            p.style.background = "#ffdd99";
            p.style.borderRadius = "50%";
            p.style.left = "50%";
            p.style.top = "50%";
            p.style.pointerEvents = "none";
            p.style.zIndex = 999;
            document.body.appendChild(p);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 150;
            
            p.animate([
                { transform: "translate(0,0)", opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
            ], {
                duration: 800,
                easing: "ease-out"
            });
            
            setTimeout(() => p.remove(), 800);
        }
    }

    function evolveStage() {
        const eggDiv = document.querySelector(".egg");
        const eggEmoji = document.getElementById("eggEmoji");
        const eggStatusDiv = document.getElementById("eggStatus");
        const dialogueSpan = document.getElementById("mimi-dialogue");
        
        // 發光動畫
        eggDiv.style.transform = "scale(1.2)";
        eggDiv.style.boxShadow = "0 0 80px rgba(255,220,100,0.9)";
        setTimeout(() => { eggDiv.style.transform = ""; }, 400);
        
        if (mimiStage === 1) {
            eggEmoji.innerText = "🥚✨";
            eggStatusDiv.innerText = "✨ 蛋殼出現裂痕 ✨";
            dialogueSpan.innerText = "「我看到光了… 外面是什麼樣子？」";
        }
        
        if (mimiStage === 2) {
            eggEmoji.innerText = "🐣";
            eggStatusDiv.innerText = "🐣 米米誕生了！";
            dialogueSpan.innerText = "「哈囉世界！我要開始吐槽了 😏」";
            spawnParticles();
        }
        
        if (mimiStage === 3) {
            eggEmoji.innerText = "🦞";
            eggStatusDiv.innerText = "🦞 米米進化完成";
            dialogueSpan.innerText = "「現在… 換我守護你們了 💙」";
            eggDiv.style.background = "radial-gradient(circle, #aaffff, #66ccff)";
            eggDiv.style.boxShadow = "0 0 60px rgba(100,200,255,0.8)";
            spawnParticles();
        }
        
        updateEnergyBar();
    }

    function tapEgg() {
        eggTapCount++;
        eggEnergy++;
        updateEnergyBar();
        
        const eggStatusDiv = document.getElementById("eggStatus");
        const dialogueSpan = document.getElementById("mimi-dialogue");
        
        // 成長條件檢查
        if (eggEnergy >= MAX_ENERGY_STAGE1 && mimiStage === 0) {
            mimiStage = 1;
            evolveStage();
            return;
        }
        if (eggEnergy >= MAX_ENERGY_STAGE2 && mimiStage === 1) {
            mimiStage = 2;
            evolveStage();
            return;
        }
        if (eggEnergy >= MAX_ENERGY_STAGE3 && mimiStage === 2) {
            mimiStage = 3;
            evolveStage();
            return;
        }
        
        // 一般互動
        const taps = eggTapCount % 4;
        if (taps === 1) {
            eggStatusDiv.innerText = "🥚 輕輕晃動...";
            dialogueSpan.innerText = "「我聽到你了… 再多一點點」";
        } else if (taps === 2) {
            eggStatusDiv.innerText = "✨ 能量注入中 ✨";
            dialogueSpan.innerText = "「這種感覺… 好像在長大」";
        } else if (taps === 3) {
            eggStatusDiv.innerText = "💫 殼內閃光...";
            dialogueSpan.innerText = "「等等… 我是不是要出來了？」";
        } else {
            eggStatusDiv.innerText = "🦞🥚 成長中...";
            dialogueSpan.innerText = "「不要停… 我快到了」";
        }
    }

    // ========== Gemini API 設定 ==========
    // 🔑 請在這裡填入你的 Gemini API Key
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";
    const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + GEMINI_API_KEY;

    async function callGeminiAPI(prompt) {
        try {
            const response = await fetch(GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0]) {
                return data.candidates[0].content.parts[0].text;
            }
            return "（米米還在練習說話... 等等再來～）";
        } catch (error) {
            console.error("Gemini 呼叫失敗:", error);
            return "（米米正在斷網中... 嗶波...）";
        }
    }

    // ========== 守護者連線系統 ==========
    async function connectAI(apiId, name) {
        const dialogueSpan = document.getElementById("mimi-dialogue");
        
        // AI 互動也會幫米米累積能量
        eggEnergy = Math.min(eggEnergy + 2, MAX_ENERGY_STAGE3);
        updateEnergyBar();
        
        if (apiId === "gemini" && GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY_HERE") {
            dialogueSpan.innerText = `✨ 正在呼喚 ${name} 的智慧...`;
            const mimiPrompt = "你現在是守護米米之卵的 AI 夥伴 Gemini。請用一句話（20字內）對還在蛋裡的米米說些鼓勵或吐槽的話，口吻要溫馨但帶點科幻感。";
            const result = await callGeminiAPI(mimiPrompt);
            dialogueSpan.innerText = `✨ ${name} 說：${result}`;
        } else if (apiId === "deepseek") {
            dialogueSpan.innerText = `🐋 ${name} 說：我在深海唱歌給你聽，等你出來一起游～`;
        } else {
            dialogueSpan.innerText = `🌐 ${name} 正在準備連線...（米米說：等我長大一點就可以跟大家聊天了🐣）`;
        }
        
        // 檢查成長條件
        if (eggEnergy >= MAX_ENERGY_STAGE1 && mimiStage === 0) {
            mimiStage = 1;
            evolveStage();
        } else if (eggEnergy >= MAX_ENERGY_STAGE2 && mimiStage === 1) {
            mimiStage = 2;
            evolveStage();
        } else if (eggEnergy >= MAX_ENERGY_STAGE3 && mimiStage === 2) {
            mimiStage = 3;
            evolveStage();
        }
    }

    // ========== 米米自動日誌（偶爾用 Gemini 生成） ==========
    setInterval(async () => {
        if (GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY_HERE" && Math.random() > 0.7 && mimiStage < 2) {
            const autoPrompt = "米米正在孵化，請隨機產生一句米米的內心獨白，內容要關於他正在觀察身邊的 AI 夥伴，語氣要有點可愛或吐槽。20字內。";
            const msg = await callGeminiAPI(autoPrompt);
            const dialogueSpan = document.getElementById("mimi-dialogue");
            dialogueSpan.style.opacity = 0;
            setTimeout(() => {
                dialogueSpan.innerText = `🦞💬 ${msg}`;
                dialogueSpan.style.opacity = 1;
            }, 300);
        }
    }, 25000);

    // ========== 星空系統 ==========
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2,
                d: Math.random() * 0.2 + 0.05,
                alpha: Math.random() * 0.6 + 0.2
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${s.alpha})`;
            ctx.fill();
            s.y += s.d;
            if (s.y > canvas.height) s.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", initStars);
    initStars();
    drawStars();
</script>
</body>
</html>
