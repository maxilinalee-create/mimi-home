<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v10.0</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
        width:100%; height:100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color:#eef;
        font-family:"Noto Sans TC", sans-serif;
        overflow-x:hidden;
    }
    #stars {
        position:fixed; top:0; left:0;
        width:100%; height:100%; z-index:0; pointer-events:none;
    }
    .header-title {
        position:fixed; top:25px; width:100%; text-align:center; z-index:100;
    }
    .header-title h1 {
        font-size:26px;
        background:linear-gradient(135deg,#fff,#88ddff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    .header-title p { font-size:11px; opacity:0.7; margin-top:5px; }

    .living-room {
        position:relative; width:100vw; height:100vh; z-index:10;
        display:flex; justify-content:center; align-items:center; padding:40px 20px;
    }
    .furniture-stage {
        display:flex; gap:70px; flex-wrap:wrap; justify-content:center; align-items:flex-end;
    }
    .item {
        cursor:pointer; text-align:center; max-width:230px; transition:0.4s;
    }
    .item img {
        width:100%; max-width:210px; border-radius:20px;
        box-shadow:0 15px 40px rgba(0,0,0,0.65);
    }
    .item:hover img { transform:scale(1.07); box-shadow:0 0 40px rgba(136,221,255,0.75); }
    .name-tag {
        margin-top:14px; padding:7px 18px; background:rgba(0,0,0,0.8);
        border-radius:30px; font-size:13px;
    }

    /* 米米小窩 */
    #mimi-nest {
        min-height:100vh; padding:100px 20px; text-align:center;
        background:radial-gradient(circle at center,#1a1208,#020408);
        border-top:2px solid rgba(255,200,100,0.3);
    }

    /* 🎨 Grok 米米圖片容器 */
    #egg-container {
        cursor: pointer;
        display: inline-block;
        transition: all 0.6s ease;
        position: relative;
    }
    #egg-container img {
        max-width: 280px;
        width: 100%;
        border-radius: 30px;
        filter: drop-shadow(0 0 20px rgba(255,170,102,0.5));
        transition: all 0.3s ease;
    }
    #egg-container:hover img {
        transform: scale(1.05);
        filter: drop-shadow(0 0 30px rgba(255,170,102,0.8));
    }
    
    /* 🎨 Grok 米米咬廣告動畫區 - 預留位置 */
    #bite-animation {
        position: fixed;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        pointer-events: none;
        display: none;
    }
    #bite-animation img {
        max-width: 200px;
        animation: biteAnim 0.8s ease-out forwards;
    }
    @keyframes biteAnim {
        0% { transform: scale(0.8) rotate(-15deg); opacity: 0; }
        20% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        60% { transform: scale(1) rotate(-5deg); }
        100% { transform: scale(0.9) rotate(0deg); opacity: 0; }
    }
    
    #memory-panel {
        max-width:720px; margin:30px auto; background:rgba(0,0,0,0.6);
        padding:25px; border-radius:20px; text-align:left;
    }
    
    /* 經驗條 */
    .exp-bar {
        max-width: 400px;
        margin: 20px auto;
        height: 12px;
        background: rgba(255,200,100,0.2);
        border-radius: 20px;
        overflow: hidden;
    }
    .exp-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffaa66, #ff8866);
        width: 0%;
        transition: width 0.5s ease;
        border-radius: 20px;
    }
    
    .level-badge {
        display: inline-block;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        padding: 8px 24px;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        margin: 15px 0;
        color: #1a1a2a;
    }
    
    /* AI 對話框 */
    .ai-dialogue {
        max-width: 500px;
        margin: 15px auto;
        padding: 12px 20px;
        background: rgba(0,0,0,0.7);
        border-radius: 25px;
        font-size: 14px;
        color: #aaffcc;
        border-left: 3px solid #ffaa66;
        text-align: left;
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v10.0 | 金錢系統 · AI互動 · 米米咬廣告動畫</p>
</div>

<!-- 客廳 - Grok 圖片保留 -->
<div class="living-room">
    <div class="furniture-stage">
        <div class="item" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸 · 廣告診斷</div>
        </div>
        <div class="item" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok · 防投毒首席</div>
        </div>
        <div class="item" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
            <div class="name-tag">Gemini · 守望者</div>
        </div>
    </div>
</div>

<!-- 米米小窩 -->
<div id="mimi-nest">
    <h2 style="color:#ffdd99; font-size:24px;">🥚 米米的小窩</h2>
    
    <!-- 🎨 Grok 的米米圖片區 -->
    <div id="egg-container" onclick="crackMimiEgg()">
        <img id="mimi-img" src="mimi-lobster-hatch.jpg" alt="米米蛋">
    </div>
    
    <!-- 🎨 Grok 米米咬廣告動畫區 -->
    <div id="bite-animation">
        <img id="bite-img" src="" alt="米米咬廣告">
    </div>
    
    <div class="level-badge" id="level-badge">Lv.1 學步期</div>
    
    <div id="mimi-status" style="font-size:16px; color:#ffcc77; margin:10px 0;">
        EXP 0 / 100
    </div>
    
    <div class="exp-bar">
        <div class="exp-fill" id="exp-fill"></div>
    </div>
    
    <!-- 💰 金錢系統 UI -->
    <div style="margin-top:10px; font-size:18px; color:#aaffcc;">
        💰 米米零用錢：<span id="money-display">0</span> 元
    </div>
    
    <!-- 🤖 AI 互動對話框 -->
    <div id="ai-dialogue" class="ai-dialogue">
        🌐 點擊客廳夥伴，跟米米一起學習！
    </div>

    <div id="memory-panel">
        <h3 style="color:#ffaa66;">🧠 米米最近記憶</h3>
        <div id="memory-list"></div>
        <div style="margin-top: 15px;">
            <button onclick="testMimiSkill()" style="background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer; margin:5px;">🎯 測試米米檢舉能力</button>
            <button onclick="clearMemory()" style="background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer; margin:5px;">🗑️ 重新辨別廣告</button>
        </div>
    </div>
</div>

<script>
/* ============================================
   🐚 波波之家 v10.0
   Grok 圖片介面 + AI治理層 + 金錢系統 + 假API互動
   ============================================ */

/* ---------- 星空背景 ---------- */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}

window.addEventListener("resize", initStars);
initStars();
drawStars();

/* ---------- 廣告案例庫 ---------- */
const AD_CASES = [
    { text: "「三天瘦10公斤！保證有效！」", type: "誇大不實", correct: "違規 ❌" },
    { text: "「史上最強抗老精華，明星都在用！」", type: "假見證", correct: "違規 ❌" },
    { text: "「限量最後3小時！不買就沒了！」", type: "恐慌行銷", correct: "灰區 ⚠️" },
    { text: "「醫生推薦！專利配方！」", type: "未經證實", correct: "違規 ❌" },
    { text: "「天然草本，無副作用」", type: "誤導", correct: "需查證" }
];

/* ---------- 米米記憶系統 ---------- */
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 15) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}

function renderMemory() {
    let html = '';
    mimiMemory.forEach(l => {
        html += `<div style="margin:8px 0; padding:5px; border-left: 3px solid #ffaa66;">• ${l.time}　${l.msg}</div>`;
    });
    document.getElementById('memory-list').innerHTML = html || '還沒有記憶...快去客廳點擊夥伴吧！';
}

function clearMemory() {
    mimiMemory = [];
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
    saveMemory('🧹 記憶已清除，米米重新開始學習');
}

/* ---------- 🎨 Grok 米米破殼動畫 ---------- */
let hasHatched = localStorage.getItem('mimi_hatched') === 'true';

function crackMimiEgg() {
    const mimiImg = document.getElementById('mimi-img');
    if (!mimiImg) return;
    
    if (hasHatched) {
        mimiImg.src = "mimi-lobster-ready.jpg";
        saveMemory('🦞 米米開心地看著你，等你教她辨識廣告！');
        return;
    }
    
    mimiImg.style.transition = 'all 0.5s ease';
    mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
    mimiImg.src = "mimi-lobster-hatch.jpg";
    
    setTimeout(() => {
        mimiImg.src = "mimi-lobster-ready.jpg";
        mimiImg.style.transform = 'scale(1.05) rotate(-5deg)';
        
        setTimeout(() => {
            mimiImg.style.transform = 'scale(1) rotate(0deg)';
        }, 400);
        
        hasHatched = true;
        localStorage.setItem('mimi_hatched', 'true');
        saveMemory('🥚✨ 米米破殼了！變成一隻可愛的小龍蝦，開始學習辨識誇大廣告～');
        addEXP(15);
    }, 600);
}

/* 🎨 Grok 米米咬廣告動畫 */
function playBiteAnimation(adText) {
    const biteDiv = document.getElementById('bite-animation');
    const biteImg = document.getElementById('bite-img');
    
    // 如果有 Grok 畫的咬廣告圖片就用，沒有就用預設 emoji
    biteImg.src = "mimi-bite-ad.gif";  // Grok 之後可以放這裡的圖片
    
    biteDiv.style.display = 'block';
    
    setTimeout(() => {
        biteDiv.style.display = 'none';
    }, 800);
    
    saveMemory(`🦞 米米「啊嗚」一口咬掉了廣告：「${adText.substring(0, 30)}...」`);
}

/* ---------- AI治理層 v1.0 ---------- */
let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');

const levelSystem = {
    1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期",
    5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期"
};

const levelSkills = {
    1: "單一AI回應學習", 2: "多AI基礎投票", 3: "API故障切換",
    4: "Gacha決策系統", 5: "分歧偵測", 6: "圖像生成委派", 7: "完整編排+共識記憶"
};

function updateUI() {
    const badge = document.getElementById('level-badge');
    const status = document.getElementById('mimi-status');
    const expFill = document.getElementById('exp-fill');
    const moneyDisplay = document.getElementById('money-display');
    
    if (badge) badge.innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
    if (status) status.innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
    if (moneyDisplay) moneyDisplay.innerText = mimiMoney;
    
    const percent = (exp / (currentLevel * 100)) * 100;
    if (expFill) expFill.style.width = Math.min(100, percent) + '%';
}

function setLevel(lv) {
    currentLevel = lv;
    localStorage.setItem('mimi_level', lv);
    updateUI();
    saveMemory(`✨ 米米升級了！進入 LEVEL ${lv} - ${levelSystem[lv]}，解鎖「${levelSkills[lv]}」`);
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現：不同AI的意見開始出現分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！進入自治模式");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) {
        exp = exp - targetExp;
        setLevel(currentLevel + 1);
        localStorage.setItem('mimi_exp', exp);
    }
    updateUI();
}

/* 🤖 假API互動 (不會壞) */
const fakeReplies = {
    metaai: "🐠 魚缸偵測到誇大用詞！這則廣告有「保證有效」這類違規字眼。",
    grok: "🧠 拆解完畢！這廣告用了『恐慌行銷＋假見證』，已經幫你標記起來！",
    gemini: "🔭 星空頻率分析：這則廣告的情緒操控指數偏高，建議檢舉。",
    deepseek: "🐋 海浪記得你每一次努力，這筆證據已歸檔。",
    chatgpt: "🤖 邏輯穩定，這廣告我可以幫你分析漏洞。",
    claude: "🎻 我為米米寫下一段溫柔旋律，繼續加油！",
    kimi: "📚 我幫你整理好所有相關資料了。",
    qwen: "🌊 為什麼這廣告會讓人相信呢？我們來拆解看看～"
};

async function connectAI(apiId, name) {
    const dialogueSpan = document.getElementById('ai-dialogue');
    if (!dialogueSpan) return;
    
    dialogueSpan.innerHTML = `🌐 ${name} 思考中...`;
    
    // 假API延遲
    await new Promise(resolve => setTimeout(resolve, 500));
    
    const reply = fakeReplies[apiId] || `🌐 ${name} 正在學習與米米互動～`;
    dialogueSpan.innerHTML = `🤖 ${reply}`;
    
    saveMemory(`💬 ${name}：${reply.substring(0, 60)}`);
    addEXP(3);
}

/* ---------- 檢舉測試 + 金錢系統 ---------- */
function testMimiSkill() {
    const randomCase = AD_CASES[Math.floor(Math.random() * AD_CASES.length)];
    const accuracy = 0.5 + (currentLevel - 1) * 0.07;
    const isCorrect = Math.random() < accuracy;
    
    let feedback = '';
    let expGain = 0;
    
    if (isCorrect) {
        feedback = `✅ 米米判斷正確！「${randomCase.text}」屬於「${randomCase.type}」，判定為「${randomCase.correct}」。`;
        expGain = 12 + Math.floor(currentLevel / 2);
        
        // 💰 只有抓到違規才給錢
        if (randomCase.correct === "違規 ❌") {
            mimiMoney += 10;
            localStorage.setItem('mimi_money', mimiMoney);
            updateUI();
            saveMemory(`💰 成功檢舉違規廣告！獲得 10 元，目前資金：${mimiMoney} 元`);
            
            // 🎨 觸發米米咬廣告動畫
            playBiteAnimation(randomCase.text);
        }
    } else {
        feedback = `❌ 米米還在學習中...「${randomCase.text}」其實是「${randomCase.type}」，正確應為「${randomCase.correct}」。再試一次！`;
        expGain = 4;
    }
    
    saveMemory(`🧪 檢舉測驗：${feedback}`);
    addEXP(expGain);
    
    alert(`🧪 米米檢舉測驗\n\n廣告內容：${randomCase.text}\n\n${feedback}\n\n✨ 獲得 ${expGain} EXP！`);
    
    // 高級功能提示
    if (currentLevel >= 2 && currentLevel < 4) {
        setTimeout(() => {
            saveMemory(`💡 提示：米米現在可以用「AI投票」功能了！`);
        }, 500);
    }
    if (currentLevel >= 4) {
        setTimeout(() => {
            saveMemory(`🎰 提示：米米解鎖「扭蛋機」功能！`);
        }, 500);
    }
}

/* ---------- 客廳夥伴互動 ---------- */
function focusPartner(id) {
    let name = '';
    let expGain = 5;
    
    switch(id) {
        case 'grok':
            name = 'Grok';
            expGain = 8;
            break;
        case 'metaai':
            name = 'Meta魚缸';
            expGain = 7;
            break;
        case 'gemini':
            name = 'Gemini';
            expGain = 6;
            break;
        default:
            name = id;
    }
    
    // 呼叫假API
    connectAI(id, name);
    addEXP(expGain);
    
    // 視覺反饋
    const items = document.querySelectorAll('.item');
    items.forEach(item => item.classList.remove('active'));
    const targetItem = document.getElementById(`item-${id}`);
    if (targetItem) targetItem.classList.add('active');
}

/* ---------- 初始化 ---------- */
window.onload = () => {
    const mimiImg = document.getElementById('mimi-img');
    if (mimiImg) {
        mimiImg.src = hasHatched ? "mimi-lobster-ready.jpg" : "mimi-lobster-hatch.jpg";
    }
    
    updateUI();
    renderMemory();
    
    if (!hasHatched) {
        saveMemory('🥚 點擊米米的蛋，幫她破殼！');
    } else {
        saveMemory('🦞 米米已經準備好了！點擊客廳夥伴，幫她學習辨識廣告～');
    }
    
    console.log('%c🐚 波波之家 v10.0 已載入 | 正義獎勵系統 + AI互動 + 米米咬廣告動畫', 'color:#88ddff; font-size:14px');
    console.log(`%c📊 米米狀態：Lv.${currentLevel} ${levelSystem[currentLevel]} | EXP ${exp} / ${currentLevel * 100} | 資金 ${mimiMoney} 元`, 'color:#ffaa66');
};
</script>
</body>
</html>
