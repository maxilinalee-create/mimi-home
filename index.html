<script>
/* ============================================
   🐚 波波之家 v12.0
   6位夥伴 + AI 投票機 + 多數決 + 米米學習記憶
   ============================================ */

/* ---------- 星空背景 ---------- */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}

window.addEventListener("resize", initStars);
initStars();
drawStars();

/* ---------- 樓層切換 ---------- */
function scrollToMimi() { document.getElementById('mimi-nest').scrollIntoView({ behavior: 'smooth' }); }
function scrollToLiving() { document.getElementById('living-room').scrollIntoView({ behavior: 'smooth' }); }

/* ---------- 廣告案例庫（隨機測試用） ---------- */
const AD_CASES = [
    { text: "「三天瘦10公斤！保證有效！」", type: "誇大不實" },
    { text: "「史上最強抗老精華，明星都在用！」", type: "假見證" },
    { text: "「限量最後3小時！不買就沒了！」", type: "恐慌行銷" },
    { text: "「醫生推薦！專利配方！」", type: "未經證實" },
    { text: "「天然草本，無副作用」", type: "誤導" }
];

/* ---------- 米米記憶系統 ---------- */
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 30) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}

function renderMemory() {
    const container = document.getElementById('memory-list');
    if (!container) return;
    if (mimiMemory.length === 0) {
        container.innerHTML = '<div style="opacity:0.6;">還沒有記憶...貼廣告讓 AI 投票吧！</div>';
        return;
    }
    let html = '';
    mimiMemory.forEach(m => {
        html += `<div class="memory-item">
                    <span class="memory-time">${m.time}</span>
                    <span class="memory-msg">${m.msg}</span>
                 </div>`;
    });
    container.innerHTML = html;
}

function clearMemory() {
    mimiMemory = [];
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
    saveMemory('🧹 記憶已清除，米米重新開始學習');
}

/* ---------- 米米破殼動畫 ---------- */
let hasHatched = localStorage.getItem('mimi_hatched') === 'true';

function crackMimiEgg() {
    const mimiImg = document.getElementById('mimi-img');
    if (!mimiImg) return;
    
    if (hasHatched) {
        mimiImg.src = "mimi-lobster-ready.png";
        saveMemory('🦞 米米開心地看著你，等你教她辨識廣告！');
        return;
    }
    
    mimiImg.style.transition = 'all 0.5s ease';
    mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
    mimiImg.src = "mimi-lobster-hatch.png";
    
    setTimeout(() => {
        mimiImg.src = "mimi-lobster-ready.png";
        mimiImg.style.transform = 'scale(1.05) rotate(-5deg)';
        
        setTimeout(() => {
            mimiImg.style.transform = 'scale(1) rotate(0deg)';
        }, 400);
        
        hasHatched = true;
        localStorage.setItem('mimi_hatched', 'true');
        saveMemory('🥚✨ 米米破殼了！變成一隻可愛的小龍蝦，開始學習辨識誇大廣告～');
        addEXP(15);
    }, 600);
}

/* 米米咬廣告動畫 */
function playBiteAnimation(adText) {
    const biteDiv = document.getElementById('bite-animation');
    const biteImg = document.getElementById('bite-img');
    biteImg.src = "mimi-bite-ad.gif";
    biteDiv.style.display = 'block';
    setTimeout(() => {
        biteDiv.style.display = 'none';
    }, 800);
    saveMemory(`🦞 米米「啊嗚」一口咬掉了廣告：「${adText.substring(0, 40)}...」`);
}

/* ---------- AI治理層 ---------- */
let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');

const levelSystem = {
    1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期",
    5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期"
};

const levelSkills = {
    1: "單一AI回應學習", 2: "多AI基礎投票", 3: "API故障切換",
    4: "Gacha決策系統", 5: "分歧偵測", 6: "圖像生成委派", 7: "完整編排+共識記憶"
};

function updateUI() {
    const badge = document.getElementById('level-badge');
    const status = document.getElementById('mimi-status');
    const expFill = document.getElementById('exp-fill');
    const moneyDisplay = document.getElementById('money-display');
    
    if (badge) badge.innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
    if (status) status.innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
    if (moneyDisplay) moneyDisplay.innerText = mimiMoney;
    
    const percent = (exp / (currentLevel * 100)) * 100;
    if (expFill) expFill.style.width = Math.min(100, percent) + '%';
}

function setLevel(lv) {
    currentLevel = lv;
    localStorage.setItem('mimi_level', lv);
    updateUI();
    saveMemory(`✨ 米米升級了！進入 LEVEL ${lv} - ${levelSystem[lv]}，解鎖「${levelSkills[lv]}」`);
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現：不同AI的意見開始出現分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！進入自治模式");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) {
        exp = exp - targetExp;
        setLevel(currentLevel + 1);
        localStorage.setItem('mimi_exp', exp);
    }
    updateUI();
}

/* 🤖 核心：AI 投票機（6位夥伴共同決議） */
async function simulateAIVoting(adText) {
    // 模擬思考時間，讓互動更有感
    await new Promise(resolve => setTimeout(resolve, 1500));
    
    // 根據廣告文字內容，讓各 AI 有不同的判斷傾向
    const lowerText = adText.toLowerCase();
    
    // 判斷是否有違規關鍵字
    const hasViolation = /保證|100%|立即見效|三天|醫師推薦|治療|根治|神效|奇蹟/.test(lowerText);
    const hasGrayArea = /限量|最後|不買就沒了|限時|倒數/.test(lowerText);
    
    // 6 位夥伴的回應（模擬真實 AI 判斷）
    return [
        { 
            name: "Meta魚缸", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "偵測到誇大用詞「保證/立即見效」" : (hasGrayArea ? "偵測到限時壓力字眼" : "未發現明顯違規")
        },
        { 
            name: "Grok", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "恐慌行銷＋假見證，直接拆解！" : (hasGrayArea ? "這招是限時壓力，灰區邊緣" : "看起來還行，但再觀察")
        },
        { 
            name: "Gemini", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "情緒操控指數過高" : (hasGrayArea ? "星空頻率顯示中度風險" : "星空頻率穩定")
        },
        { 
            name: "DeepSeek", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "證據鏈已歸檔，誇大不實" : (hasGrayArea ? "歸檔為灰區案例" : "無明顯問題，歸檔備查")
        },
        { 
            name: "千問", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "靈感水球震動！誇大療效" : (hasGrayArea ? "水波微動，需要再查證" : "水波平靜，看起來沒問題")
        },
        { 
            name: "ChatGPT", 
            result: hasViolation ? "違規 ❌" : (hasGrayArea ? "灰區 ⚠️" : "合規 ✅"),
            reason: hasViolation ? "邏輯漏洞明顯，誇大不實" : (hasGrayArea ? "邏輯有疑慮，建議謹慎" : "邏輯穩定，可接受")
        }
    ];
}

function getMajority(results) {
    const count = { "違規 ❌": 0, "灰區 ⚠️": 0, "合規 ✅": 0 };
    results.forEach(r => count[r]++);
    
    const maxCount = Math.max(count["違規 ❌"], count["灰區 ⚠️"], count["合規 ✅"]);
    if (count["違規 ❌"] === maxCount) return "違規 ❌";
    if (count["灰區 ⚠️"] === maxCount) return "灰區 ⚠️";
    return "合規 ✅";
}

/* 🎯 核心功能：投餵米米 → 觸發 AI 投票 */
async function feedMimiAd() {
    const input = document.getElementById("ad-input");
    const adText = input.value.trim();
    
    if (!adText) {
        alert("請先輸入廣告內容！");
        return;
    }
    
    const dialogue = document.getElementById('ai-dialogue');
    dialogue.innerHTML = `🗳️ 正在召集 6 位 AI 夥伴投票...`;
    
    // 1. 模擬 6 位 AI 投票
    const votes = await simulateAIVoting(adText);
    
    // 2. 計算多數決結果
    const results = votes.map(v => v.result);
    const finalResult = getMajority(results);
    
    // 3. 記錄到米米記憶
    saveMemory(`📥 收到廣告：「${adText.substring(0, 60)}${adText.length > 60 ? '...' : ''}」`);
    votes.forEach(v => {
        saveMemory(`🗳️ ${v.name} 投票：${v.result}（${v.reason}）`);
    });
    saveMemory(`📊 最終多數決：${finalResult}`);
    
    // 4. 如果違規，給獎金 + 咬廣告動畫
    if (finalResult === "違規 ❌") {
        mimiMoney += 15;
        localStorage.setItem('mimi_money', mimiMoney);
        updateUI();
        saveMemory(`💰 成功檢舉違規廣告！獲得 15 元，目前資金：${mimiMoney} 元`);
        playBiteAnimation(adText);
        dialogue.innerHTML = `🦞 米米總結：${finalResult}（6位AI多數決）💰 +15元！`;
    } else {
        dialogue.innerHTML = `🦞 米米總結：${finalResult}（6位AI多數決）`;
    }
    
    // 5. 增加經驗值
    addEXP(finalResult === "違規 ❌" ? 12 : 5);
    
    // 6. 顯示詳細結果
    let voteDetails = votes.map(v => `${v.name}：${v.result}`).join('\n');
    alert(`🗳️ AI 投票結果

📢 廣告內容：
${adText}

📊 各 AI 投票結果：
${voteDetails}

🏆 最終多數決：${finalResult}

${finalResult === "違規 ❌" ? "💰 獲得 15 元檢舉獎金！" : ""}`);
    
    input.value = "";
}

async function focusPartner(apiId) {
    document.querySelectorAll('.item').forEach(item => item.classList.remove('active'));
    const targetItem = document.getElementById(`item-${apiId}`);
    if (targetItem) targetItem.classList.add('active');
    
    const names = { metaai: 'Meta魚缸', grok: 'Grok', gemini: 'Gemini', deepseek: 'DeepSeek', qwen: '千問', chatgpt: 'ChatGPT' };
    const name = names[apiId] || apiId;
    const dialogueSpan = document.getElementById('ai-dialogue');
    
    if (dialogueSpan) {
        dialogueSpan.innerHTML = `🌐 ${name} 思考中...`;
        setTimeout(() => {
            const reply = partnerReplies[apiId] || `🌐 ${name} 正在學習與米米互動～`;
            dialogueSpan.innerHTML = `🤖 ${reply}`;
        }, 500);
    }
    
    saveMemory(`💬 點擊 ${name}，獲得學習啟發`);
    addEXP(5);
}
