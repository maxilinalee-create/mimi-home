<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v0.7</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
        width: 100%; height: 100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color: #eef; font-family: "Noto Sans TC", sans-serif; overflow-x: hidden;
    }
    #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .header-title {
        position: fixed; top: 25px; width: 100%; text-align: center; z-index: 100;
    }
    .header-title h1 {
        font-size: 26px;
        background: linear-gradient(135deg, #ffffff, #88ddff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-title p { font-size: 11px; opacity: 0.7; margin-top: 5px; }

    .living-room {
        position: relative; width: 100vw; height: 100vh; z-index: 10;
        display: flex; justify-content: center; align-items: center; padding: 20px;
    }

    .furniture-stage {
        display: flex; justify-content: center; align-items: flex-end; gap: 60px;
        width: 100%; max-width: 1100px; flex-wrap: wrap;
    }

    .item {
        text-align: center; cursor: pointer; transition: all 0.4s ease;
        max-width: 220px;
    }
    .item img {
        width: 100%; max-width: 200px; border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        transition: all 0.3s ease;
    }
    .item:hover img {
        transform: scale(1.08);
        box-shadow: 0 0 35px rgba(136, 221, 255, 0.7);
    }
    .item .name-tag {
        margin-top: 12px; padding: 6px 16px; background: rgba(0,0,0,0.8);
        border-radius: 30px; font-size: 12.5px; white-space: nowrap;
    }

    .mimi-area {
        position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
        text-align: center; z-index: 20;
    }
    .mimi-area span { font-size: 82px; cursor: pointer; }

    .scroll-indicator {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        color: #ffdd99; font-size: 14px; cursor: pointer;
    }

    @media (max-width: 768px) {
        .furniture-stage { gap: 30px; }
        .item img { max-width: 150px; }
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v0.7 | 反投毒 · 救米米 · 證據累積</p>
</div>

<div class="living-room">
    <div class="furniture-stage">

        <!-- Meta 魚缸 -->
        <div class="item" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸 · 廣告診斷</div>
        </div>

        <!-- Grok 沙發 -->
        <div class="item" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok · 防投毒首席</div>
        </div>

        <!-- Gemini 望遠鏡 -->
        <div class="item" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
            <div class="name-tag">Gemini · 守望者</div>
        </div>

    </div>

    <!-- 米米區域 -->
    <div class="mimi-area">
        <span onclick="focusPartner('mimi')">🥚💖</span>
        <div style="margin-top:8px; color:#ffdd99; font-size:13px;">米米 · 學習中</div>
    </div>

    <div class="scroll-indicator" onclick="scrollToMimi()">🥚 往下 → 米米的小窩 ▼</div>
</div>

<script>
    function focusPartner(id) {
        alert(`你點擊了 ${id}！\n\n之後這裡會顯示對話與功能`);
    }
    function scrollToMimi() {
        alert("米米的小窩頁面開發中～");
    }

    console.log("%c🐚 波波之家 v0.7 已載入 | 布局優化版", "color:#88ddff; font-size:15px");
</script>
</body>
</html>
