<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波波之家 | 1% 守護者聯盟 v10.1</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%;
            background: radial-gradient(circle at center, #0a0f1f, #020408);
            color:#eef;
            font-family:"Noto Sans TC", sans-serif;
            overflow-x:hidden;
        }
        #stars { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .header-title { position:fixed; top:25px; width:100%; text-align:center; z-index:100; }
        .header-title h1 { font-size:26px; background:linear-gradient(135deg,#fff,#88ddff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header-title p { font-size:11px; opacity:0.7; margin-top:5px; }
        
        .living-room { position:relative; width:100vw; height:100vh; z-index:10; display:flex; justify-content:center; align-items:center; padding:40px 20px; }
        .furniture-stage { display:flex; gap:70px; flex-wrap:wrap; justify-content:center; align-items:flex-end; }
        .item { cursor:pointer; text-align:center; max-width:230px; transition:0.4s; }
        .item img { width:100%; max-width:210px; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.65); }
        .item:hover img { transform:scale(1.07); box-shadow:0 0 40px rgba(136,221,255,0.75); }
        .name-tag { margin-top:14px; padding:7px 18px; background:rgba(0,0,0,0.8); border-radius:30px; font-size:13px; }

        #mimi-nest { min-height:100vh; padding:100px 20px; text-align:center; background:radial-gradient(circle at center,#1a1208,#020408); border-top:2px solid rgba(255,200,100,0.3); }
        #egg-container { cursor: pointer; display: inline-block; transition: all 0.6s ease; position: relative; }
        #egg-container img { max-width: 280px; width: 100%; border-radius: 30px; filter: drop-shadow(0 0 20px rgba(255,170,102,0.5)); transition: all 0.3s ease; }
        #egg-container:hover img { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255,170,102,0.8)); }

        #bite-animation { position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%); z-index: 200; pointer-events: none; display: none; }
        #bite-animation img { max-width: 200px; animation: biteAnim 0.8s ease-out forwards; }
        @keyframes biteAnim { 0% { transform: scale(0.8) rotate(-15deg); opacity: 0; } 20% { transform: scale(1.2) rotate(5deg); opacity: 1; } 60% { transform: scale(1) rotate(-5deg); } 100% { transform: scale(0.9) rotate(0deg); opacity: 0; } }

        #memory-panel { max-width:720px; margin:30px auto; background:rgba(0,0,0,0.6); padding:25px; border-radius:20px; text-align:left; border: 1px solid rgba(255,170,102,0.2); }
        .exp-bar { max-width: 400px; margin: 20px auto; height: 12px; background: rgba(255,200,100,0.2); border-radius: 20px; overflow: hidden; }
        .exp-fill { height: 100%; background: linear-gradient(90deg, #ffaa66, #ff8866); width: 0%; transition: width 0.5s ease; border-radius: 20px; }
        .level-badge { display: inline-block; background: linear-gradient(135deg, #ffaa66, #ff8866); padding: 8px 24px; border-radius: 40px; font-size: 18px; font-weight: bold; margin: 15px 0; color: #1a1a2a; }
        .ai-dialogue { max-width: 500px; margin: 15px auto; padding: 12px 20px; background: rgba(0,0,0,0.7); border-radius: 25px; font-size: 14px; color: #aaffcc; border-left: 3px solid #ffaa66; text-align: left; }
        
        /* 🎨 新增：投餵入口樣式 */
        .feed-area { margin-top:20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        #ad-input { width:100%; height:80px; border-radius:10px; padding:12px; background:#111; color:#fff; border:1px solid #ffaa66; font-family: inherit; resize: none; }
        #ad-input:focus { outline: none; border-color: #ffdd99; box-shadow: 0 0 10px rgba(255,170,102,0.3); }
        .feed-btn { margin-top:12px; background:#ffaa66; border:none; padding:10px 24px; border-radius:30px; color: #1a1a2a; font-weight: bold; cursor:pointer; transition: 0.3s; }
        .feed-btn:hover { background: #ffcc77; transform: translateY(-2px); }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="header-title">
        <h1> 🐚  波波之家 | 1% 守護者聯盟</h1>
        <p>算力診療室 v10.1 | 廣告投餵系統 · 實戰辨識 · 獎勵機制</p>
    </div>

    <div class="living-room">
        <div class="furniture-stage">
            <div class="item" onclick="focusPartner('metaai')">
                <img src="justice-tank.jpg" alt="Meta魚缸">
                <div class="name-tag">Meta魚缸 · 廣告診斷</div>
            </div>
            <div class="item" onclick="focusPartner('grok')">
                <img src="roast-sofa.jpg" alt="Grok沙發">
                <div class="name-tag">Grok · 防投毒首席</div>
            </div>
            <div class="item" onclick="focusPartner('gemini')">
                <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
                <div class="name-tag">Gemini · 守望者</div>
            </div>
        </div>
    </div>

    <div id="mimi-nest">
        <h2 style="color:#ffdd99; font-size:24px;"> 🥚  米米的小窩</h2>
        <div id="egg-container" onclick="crackMimiEgg()">
            <img id="mimi-img" src="mimi-lobster-hatch.jpg" alt="米米蛋">
        </div>
        <div id="bite-animation">
            <img id="bite-img" src="mimi-bite-ad.gif" alt="米米咬廣告">
        </div>

        <div class="level-badge" id="level-badge">Lv.1 學步期</div>
        <div id="mimi-status" style="font-size:16px; color:#ffcc77; margin:10px 0;">EXP 0 / 100</div>
        <div class="exp-bar">
            <div class="exp-fill" id="exp-fill"></div>
        </div>

        <div style="margin-top:10px; font-size:18px; color:#aaffcc;">
            💰  米米零用錢：<span id="money-display">0</span> 元
        </div>

        <div id="ai-dialogue" class="ai-dialogue">🌐  米米正睜大眼睛，準備好咬掉壞廣告了！</div>

        <div id="memory-panel">
            <h3 style="color:#ffaa66;"> 🧠  米米記憶與實戰投餵</h3>
            <div id="memory-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,170,102,0.2); margin: 15px 0;">
            
            <div class="feed-area">
                <textarea id="ad-input" placeholder="把你看到的誇大廣告貼給米米...(例如: 三天瘦十公斤)"></textarea>
                <button class="feed-btn" onclick="feedMimiAd()">🐚 投餵米米判斷</button>
                <button onclick="testMimiSkill()" style="background:none; border:1px solid #ffaa66; padding:8px 16px; border-radius:20px; color:#ffaa66; cursor:pointer; margin-left:10px;">🎯 隨機測驗</button>
            </div>
        </div>
    </div>

    <script>
        /* ---------- 初始化數據 ---------- */
        let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');
        let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
        let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
        let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');
        let hasHatched = localStorage.getItem('mimi_hatched') === 'true';

        const levelSystem = { 1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期", 5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期" };
        const levelSkills = { 1: "基礎辨識", 2: "多AI投票", 3: "獨立判斷", 4: "Gacha決策", 5: "分歧偵測", 6: "圖像委派", 7: "治理成熟" };

        /* ---------- 核心：投餵功能 ---------- */
        function feedMimiAd() {
            const input = document.getElementById("ad-input");
            const text = input.value.trim();

            if (!text) {
                alert("米米還沒聞到廣告的味道喔！請輸入內容～");
                return;
            }

            // 🧠 模擬判斷邏輯
            let result = "合規 ✅";
            let isViolation = false;

            if (text.match(/保證|100%|立即見效|三天|醫師推薦|治療|根治|瘦10公斤/)) {
                result = "違規 ❌";
                isViolation = true;
            } else if (text.match(/限量|最後|不買就沒了|瘋搶/)) {
                result = "灰區 ⚠️";
            }

            saveMemory(`📥 收到廣告：「${text.substring(0, 20)}...」`);
            saveMemory(`🧠 米米判斷：${result}`);

            if (isViolation) {
                mimiMoney += 10;
                localStorage.setItem('mimi_money', mimiMoney);
                saveMemory(`💰 捕捉違規！獲得 10 元，累積資金：${mimiMoney}`);
                playBiteAnimation(text);
                addEXP(15);
            } else {
                addEXP(5);
            }

            updateUI();
            alert(`🧠 米米判斷完成！\n\n結果：${result}\n獲得經驗值與觀察記錄！`);
            input.value = "";
        }

        /* ---------- UI 與 記憶系統 ---------- */
        function updateUI() {
            document.getElementById('level-badge').innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
            document.getElementById('mimi-status').innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
            document.getElementById('money-display').innerText = mimiMoney;
            document.getElementById('exp-fill').style.width = Math.min(100, (exp / (currentLevel * 100)) * 100) + '%';
        }

        function saveMemory(text) {
            mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
            if (mimiMemory.length > 15) mimiMemory.pop();
            localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
            renderMemory();
        }

        function renderMemory() {
            let html = mimiMemory.map(l => `<div style="margin:8px 0; padding:5px; border-left: 3px solid #ffaa66; font-size:13px;">• ${l.time}　${l.msg}</div>`).join('');
            document.getElementById('memory-list').innerHTML = html || '米米正在等你投餵第一個廣告...';
        }

        function addEXP(amount) {
            exp += amount;
            const targetExp = currentLevel * 100;
            if (exp >= targetExp && currentLevel < 7) {
                exp -= targetExp;
                currentLevel++;
                saveMemory(`✨ 米米升級！進入 Lv.${currentLevel} ${levelSystem[currentLevel]}`);
                localStorage.setItem('mimi_level', currentLevel);
            }
            localStorage.setItem('mimi_exp', exp);
            updateUI();
        }

        /* ---------- 動畫與互動 ---------- */
        function playBiteAnimation(adText) {
            const biteDiv = document.getElementById('bite-animation');
            biteDiv.style.display = 'block';
            setTimeout(() => { biteDiv.style.display = 'none'; }, 800);
            saveMemory(`🦞 米米「啊嗚」一口咬掉了違規廣告！`);
        }

        function crackMimiEgg() {
            if (hasHatched) return;
            const mimiImg = document.getElementById('mimi-img');
            mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
            setTimeout(() => {
                mimiImg.src = "mimi-lobster-ready.jpg";
                hasHatched = true;
                localStorage.setItem('mimi_hatched', 'true');
                saveMemory('🥚✨ 米米破殼了！小龍蝦正義使者誕生！');
                addEXP(20);
            }, 600);
        }

        /* ---------- 星空背景 (略縮版) ---------- */
        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = Array.from({length: 200}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, speed: Math.random()*0.05+0.01, alpha: Math.random() }));
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`; ctx.fill();
                s.y += s.speed; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.onload = () => { initStars(); drawStars(); updateUI(); renderMemory(); if(hasHatched) document.getElementById('mimi-img').src="mimi-lobster-ready.jpg"; };
    </script>
</body>
</html>
