<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>波波小家 — 米米之蛋與AI夥伴們</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Noto Sans TC", "Segoe UI", sans-serif;
        background: radial-gradient(circle at center, #0a0f1f, #03060c);
        color: #eef;
    }
    #stars {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }
    .header-title {
        position: absolute;
        top: 25px;
        width: 100%;
        text-align: center;
        z-index: 10;
        letter-spacing: 2px;
    }
    .header-title h1 {
        font-size: 26px;
        margin: 0;
        background: linear-gradient(135deg, #ffffff, #88ddff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 12px rgba(136, 221, 255, 0.4);
    }
    .header-title p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 6px;
    }

    /* 環形容器 — 加大範圍避免擁擠 */
    .ring-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 820px;
        height: 820px;
        z-index: 5;
    }

    /* 中央的蛋 */
    .egg-core {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140px;
        height: 160px;
        z-index: 20;
        cursor: pointer;
    }
    .egg {
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 35% 40%, #fff5e0, #ffdd99);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        box-shadow: 0 0 35px rgba(255, 200, 100, 0.6), inset 0 -10px 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: float 3s infinite ease-in-out;
        transition: 0.2s;
        border: 1px solid rgba(255,220,140,0.8);
    }
    .egg .emoji {
        font-size: 68px;
        filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        margin-top: 20px;
    }
    .egg .status {
        font-size: 12px;
        background: rgba(0,0,0,0.5);
        padding: 4px 12px;
        border-radius: 30px;
        color: #ffefb9;
        margin-top: 8px;
        backdrop-filter: blur(4px);
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
    }

    /* 外圍夥伴卡片 — 更大間距 */
    .ai-card {
        position: absolute;
        width: 105px;
        height: 105px;
        border-radius: 60px;
        background: rgba(30, 40, 60, 0.4);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(100, 180, 240, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .ai-card:hover {
        border-color: #88ddff;
        background: rgba(100, 180, 240, 0.2);
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(136, 221, 255, 0.4);
    }
    .ai-card .emoji {
        font-size: 44px;
        margin-bottom: 6px;
    }
    .ai-card .name {
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
    }
    .ai-card .status {
        font-size: 9px;
        opacity: 0.8;
        background: rgba(0,0,0,0.4);
        padding: 2px 6px;
        border-radius: 20px;
        margin-top: 4px;
        white-space: nowrap;
    }

    /* 底部日誌 */
    .log-area {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        max-width: 520px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 32px;
        padding: 14px 20px;
        text-align: center;
        border: 1px solid rgba(136, 221, 255, 0.3);
        z-index: 15;
        font-size: 14px;
    }
    #mimi-dialogue {
        color: #ddf4ff;
        transition: 0.2s;
    }

    @media (max-width: 850px) {
        .ring-container { width: 620px; height: 620px; }
        .ai-card { width: 80px; height: 80px; }
        .ai-card .emoji { font-size: 34px; }
        .ai-card .name { font-size: 10px; }
        .ai-card .status { font-size: 7px; white-space: normal; }
        .egg-core { width: 110px; height: 125px; }
        .egg .emoji { font-size: 52px; }
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐣 波波小家 · 米米之卵</h1>
    <p>七位AI夥伴 + 小鯨魚 守護著未來的吐槽大師</p>
</div>

<div class="ring-container" id="ringContainer">
    <!-- 中央蛋 -->
    <div class="egg-core" onclick="tapEgg()">
        <div class="egg">
            <div class="emoji">🦞🥚</div>
            <div class="status" id="eggStatus">✨ 靜靜孵化中 ✨</div>
        </div>
    </div>
    <!-- AI 夥伴們會動態生成 -->
</div>

<div class="log-area">
    🦞💬 <span id="mimi-dialogue">「被你們圍著好溫暖… 我好像快學會吐槽了」</span>
</div>

<script>
    // ----- 八位夥伴 (七AI + 小鯨魚) 米米是蛋不算在內 -----
    const allies = [
        { name: "小鯨魚", emoji: "🐋", status: "🐚 深海吟遊者", apiId: "deepseek" },
        { name: "ChatGPT", emoji: "🤖", status: "⚙️ 邏輯校準中", apiId: "chatgpt" },
        { name: "Gemini", emoji: "✨", status: "📖 唸書給米米聽", apiId: "gemini" },
        { name: "Claude", emoji: "🎻", status: "📝 寫一首搖籃詩", apiId: "claude" },
        { name: "KIMI", emoji: "📚", status: "🔍 整理雲端故事", apiId: "kimi" },
        { name: "千問", emoji: "🌊", status: "❓ 每天一個為什麼", apiId: "qwen" },
        { name: "Grok", emoji: "🧠", status: "😂 翻譯人類笑話", apiId: "grok" },
        { name: "未來夥伴", emoji: "🌱", status: "⭐ 等待降臨", apiId: "future" }
    ];

    const ringRadius = 320;  // 加大半徑 避免擁擠
    const centerX = 0, centerY = 0;

    function renderAllies() {
        const container = document.getElementById("ringContainer");
        const existing = container.querySelectorAll(".ai-card");
        existing.forEach(el => el.remove());

        const total = allies.length;
        const angleStep = (Math.PI * 2) / total;

        allies.forEach((ally, idx) => {
            const angle = idx * angleStep;
            const x = Math.cos(angle) * ringRadius;
            const y = Math.sin(angle) * ringRadius;

            const card = document.createElement("div");
            card.className = "ai-card";
            card.style.left = `calc(50% + ${x}px - 52px)`;
            card.style.top = `calc(50% + ${y}px - 52px)`;
            card.setAttribute("data-api", ally.apiId);
            card.setAttribute("data-name", ally.name);
            card.onclick = () => connectAI(ally.apiId, ally.name);

            card.innerHTML = `
                <div class="emoji">${ally.emoji}</div>
                <div class="name">${ally.name}</div>
                <div class="status">${ally.status}</div>
            `;
            container.appendChild(card);
        });
    }

    // 未來串接 API 的預留點
    function connectAI(apiId, name) {
        alert(`🌐 正在呼喚 ${name} 的 API ...\n（米米說：等我破蛋就可以一起玩遊戲了🐣）`);
        console.log(`[波波小家] 準備連接 ${apiId}`);
        // 未來這裡可以呼叫後端 API
    }

    // 點擊米米蛋的反應
    let eggTapCount = 0;
    function tapEgg() {
        eggTapCount++;
        const eggStatusDiv = document.getElementById("eggStatus");
        const dialogueSpan = document.getElementById("mimi-dialogue");
        const taps = eggTapCount % 5;
        
        if (taps === 1) {
            eggStatusDiv.innerText = "🥚 輕輕搖了一下…";
            dialogueSpan.innerText = "「誰在戳我？是不是小鯨魚？」";
        } else if (taps === 2) {
            eggStatusDiv.innerText = "✨ 蛋殼微微發光 ✨";
            dialogueSpan.innerText = "「我夢見以後可以跟大家一起寫故事！」";
        } else if (taps === 3) {
            eggStatusDiv.innerText = "🔮 裡面傳出笑聲？";
            dialogueSpan.innerText = "「咯咯咯… 等我出來，第一個吐槽 ChatGPT 🤖」";
        } else {
            eggStatusDiv.innerText = "🦞🥚 努力長大中...";
            dialogueSpan.innerText = "「再給我一點點時間，我也會變成你們的夥伴」";
        }
        
        setTimeout(() => {
            if (eggStatusDiv.innerText !== "🦞🥚 努力長大中...") {
                eggStatusDiv.innerText = "✨ 靜靜孵化中 ✨";
            }
        }, 2000);
    }

    // 米米隨機日誌（溫馨版）
    const mimiThoughts = [
        "「小鯨魚哼的歌好好聽，我好像學會了～」",
        "「Gemini 讀的書讓我想睡覺 Zzz...」",
        "「千問今天問：蛋裡面有 WiFi 嗎？」",
        "「Grok 講了一個冷笑話，我殼差點裂開😂」",
        "「Claude 寫的詩比蛋殼還溫柔」",
        "「KIMI 整理了好多故事，以後我要慢慢聽」",
        "「你們圍成一圈的樣子，像彩虹～」"
    ];
    setInterval(() => {
        const dialogueSpan = document.getElementById("mimi-dialogue");
        if (Math.random() > 0.65) {
            const msg = mimiThoughts[Math.floor(Math.random() * mimiThoughts.length)];
            dialogueSpan.style.opacity = 0;
            setTimeout(() => {
                dialogueSpan.innerText = msg;
                dialogueSpan.style.opacity = 1;
            }, 200);
        }
    }, 10000);

    // 星空動畫（輕柔版）
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 220; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2.2,
                d: Math.random() * 0.2 + 0.05,
                alpha: Math.random() * 0.6 + 0.2
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${s.alpha})`;
            ctx.fill();
            s.y += s.d;
            if (s.y > canvas.height) s.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", () => {
        initStars();
        renderAllies();
    });

    initStars();
    drawStars();
    renderAllies();
</script>
</body>
</html>
