<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v9.3</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
        width:100%; height:100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color:#eef;
        font-family:"Noto Sans TC", sans-serif;
        overflow-x:hidden;
    }
    #stars {
        position:fixed; top:0; left:0;
        width:100%; height:100%; z-index:0; pointer-events:none;
    }
    .header-title {
        position:fixed; top:25px; width:100%; text-align:center; z-index:100;
    }
    .header-title h1 {
        font-size:26px;
        background:linear-gradient(135deg,#fff,#88ddff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    .header-title p { font-size:11px; opacity:0.7; margin-top:5px; }

    .living-room {
        position:relative; width:100vw; height:100vh; z-index:10;
        display:flex; justify-content:center; align-items:center; padding:40px 20px;
    }
    .furniture-stage {
        display:flex; gap:70px; flex-wrap:wrap; justify-content:center; align-items:flex-end;
    }
    .item {
        cursor:pointer; text-align:center; max-width:230px; transition:0.4s;
    }
    .item img {
        width:100%; max-width:210px; border-radius:20px;
        box-shadow:0 15px 40px rgba(0,0,0,0.65);
    }
    .item:hover img { transform:scale(1.07); box-shadow:0 0 40px rgba(136,221,255,0.75); }
    .name-tag {
        margin-top:14px; padding:7px 18px; background:rgba(0,0,0,0.8);
        border-radius:30px; font-size:13px;
    }

    /* 米米小窩 */
    #mimi-nest {
        min-height:100vh; padding:100px 20px; text-align:center;
        background:radial-gradient(circle at center,#1a1208,#020408);
        border-top:2px solid rgba(255,200,100,0.3);
    }
    #egg {
        font-size:160px; cursor:pointer; transition:all 0.8s ease;
        display:inline-block;
    }
    #memory-panel {
        max-width:720px; margin:30px auto; background:rgba(0,0,0,0.6);
        padding:25px; border-radius:20px; text-align:left;
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v9.3 | 反誇大廣告 · 米米 · 證據累積 · AI治理層</p>
</div>

<!-- 客廳 -->
<div class="living-room">
    <div class="furniture-stage">
        <div class="item" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸 · 廣告診斷</div>
        </div>
        <div class="item" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok · 防投毒首席</div>
        </div>
        <div class="item" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
            <div class="name-tag">Gemini · 守望者</div>
        </div>
    </div>
</div>

<!-- 米米小窩 -->
<div id="mimi-nest">
    <h2 style="color:#ffdd99; font-size:42px;">🥚 米米的小窩</h2>
    
    <div id="egg" onclick="crackMimiEgg()">🥚</div>
    
    <div id="mimi-status" style="font-size:19px; color:#ffcc77; margin:25px 0;">
        Lv.1 學步期 • EXP 0
    </div>

    <div id="memory-panel">
        <h3 style="color:#ffaa66;">🧠 米米最近記憶</h3>
        <div id="memory-list"></div>
    </div>
</div>

<script>
/* ============================================
   🐚 波波之家 v9.3
   整合：Grok 圖片介面 + ChatGPT AI治理層
   ============================================ */

/* ---------- 星空背景 ---------- */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}

window.addEventListener("resize", initStars);
initStars();
drawStars();

/* ---------- 米米記憶系統 ---------- */
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 12) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}

function renderMemory() {
    let html = '';
    mimiMemory.forEach(l => {
        html += `<div style="margin:8px 0; padding:5px; border-left: 3px solid #ffaa66;">• ${l.time}　${l.msg}</div>`;
    });
    document.getElementById('memory-list').innerHTML = html || '還沒有記憶...快去客廳點擊夥伴吧！';
}

/* ---------- 米米破殼三階段 ---------- */
function crackMimiEgg() {
    const egg = document.getElementById('egg');
    
    egg.style.transition = 'all 0.7s';
    egg.style.transform = 'scale(1.6) rotate(15deg)';
    egg.innerHTML = '🥚💥';
    
    setTimeout(() => {
        egg.innerHTML = '🦞✨';
        egg.style.fontSize = '170px';
        egg.style.transform = 'scale(1.12)';
        
        saveMemory('🥚 米米破殼了！開始學習辨識誇大廣告～');
        
        setTimeout(() => {
            egg.style.transform = 'scale(1.08) rotate(-6deg)';
        }, 600);
    }, 650);
}

/* ---------- AI治理層 v1.0 (Level 1~7) ---------- */
let currentLevel = 1;
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');

const levelSystem = {
    1: "學步期",
    2: "觀察期",
    3: "判斷期",
    4: "協作期",
    5: "多AI分歧期",
    6: "策略整合期",
    7: "治理成熟期"
};

function setLevel(lv) {
    currentLevel = lv;
    const status = document.getElementById("mimi-status");
    if (status) {
        status.innerText = `Lv.${lv} ${levelSystem[lv]} • EXP ${exp}`;
    }
    saveMemory(`✨ 米米升級了！進入 LEVEL ${lv} - ${levelSystem[lv]}`);
    localStorage.setItem('mimi_level', lv);
    
    // 觸發等級事件
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現：不同AI的意見開始出現分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！進入自治模式");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    
    const status = document.getElementById("mimi-status");
    if (status) {
        status.innerText = `Lv.${currentLevel} ${levelSystem[currentLevel]} • EXP ${exp}`;
    }
    
    // 升級邏輯：每100 EXP升一級
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) {
        exp = exp - targetExp;
        setLevel(currentLevel + 1);
    }
}

/* 🧠 AI投票系統 (Level 2+ 解鎖) */
function aiVote(action) {
    if (currentLevel < 2) {
        saveMemory(`🔒 需要 Level 2 才能使用 AI 投票系統 (目前 Lv.${currentLevel})`);
        return "未解鎖";
    }
    
    const votes = {
        Grok: Math.random(),
        DeepSeek: Math.random(),
        Gemini: Math.random(),
        ChatGPT: Math.random()
    };
    
    let result = "灰區 ⚠️";
    const avg = Object.values(votes).reduce((a,b)=>a+b,0) / 4;
    
    if (avg > 0.66) result = "合規 ✅";
    else if (avg < 0.33) result = "違規 ❌";
    
    saveMemory(`🗳️ AI投票 「${action}」 → ${result} (Grok:${votes.Grok.toFixed(2)}, DeepSeek:${votes.DeepSeek.toFixed(2)})`);
    addEXP(10);
    
    return result;
}

/* 🎰 違規扭蛋機 (Level 4+ 解鎖) */
function gachaMachine() {
    if (currentLevel < 4) {
        saveMemory(`🔒 需要 Level 4 才能使用扭蛋機 (目前 Lv.${currentLevel})`);
        return "未解鎖";
    }
    
    const r = Math.random();
    let result;
    
    if (r < 0.33) result = "違規 ❌";
    else if (r < 0.66) result = "灰區 ⚠️";
    else result = "合規 ✅";
    
    saveMemory(`🎰 扭蛋機結果：${result}`);
    addEXP(8);
    
    return result;
}

/* ---------- 客廳夥伴互動 (觸發米米學習) ---------- */
function focusPartner(id) {
    let msg = '';
    let expGain = 5;
    
    if (id === 'grok') {
        msg = '🧠 Grok：把垃圾廣告丟過來，我幫你拆得乾乾淨淨！';
        expGain = 8;
    } else if (id === 'metaai') {
        msg = '🐠 Meta魚缸：收到廣告，正在分析邏輯漏洞...檢舉代碼已產生！';
        expGain = 7;
    } else if (id === 'gemini') {
        msg = '🔭 Gemini：我觀測到星空頻率波動，需要我幫忙預測下一個投毒模式嗎？';
        expGain = 6;
    } else {
        msg = `你點擊了 ${id}`;
    }
    
    saveMemory(`💬 ${msg}`);
    addEXP(expGain);
    
    // 高級功能提示
    if (currentLevel >= 2) {
        setTimeout(() => {
            saveMemory(`💡 提示：米米現在可以用「AI投票」功能了！`);
        }, 500);
    }
}

/* ---------- 手動測試功能 (可選) ---------- */
function testAd(adText) {
    const result = aiVote(adText);
    alert(`廣告：「${adText}」\n\nAI投票結果：${result}`);
}

/* ---------- 初始化 ---------- */
window.onload = () => {
    // 載入儲存的等級
    const savedLevel = localStorage.getItem('mimi_level');
    if (savedLevel) {
        currentLevel = parseInt(savedLevel);
        exp = parseInt(localStorage.getItem('mimi_exp') || '0');
    }
    
    // 更新 UI
    const status = document.getElementById("mimi-status");
    if (status) {
        status.innerText = `Lv.${currentLevel} ${levelSystem[currentLevel]} • EXP ${exp}`;
    }
    
    renderMemory();
    
    console.log('%c🐚 波波之家 v9.3 已載入 | AI治理層啟動 | Grok圖片介面保留', 'color:#88ddff; font-size:14px');
    console.log(`%c📊 米米狀態：Lv.${currentLevel} ${levelSystem[currentLevel]} | EXP ${exp}`, 'color:#ffaa66');
    
    // 歡迎訊息
    saveMemory(`🎉 歡迎來到波波之家！米米現在是 ${levelSystem[currentLevel]}，點擊客廳夥伴幫他學習吧！`);
};
</script>
</body>
</html>
