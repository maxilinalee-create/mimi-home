<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>米米 Nexus</title>

<style>
body {
  margin:0;
  background:#050814;
  color:white;
  font-family:"Noto Sans TC",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

button {
  padding:12px 25px;
  font-size:16px;
  background:#66d9ef;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  max-width:420px;
  text-align:center;
  line-height:1.6;
}
</style>
</head>

<body>

<h2>🦞 米米 Nexus</h2>
<button onclick="talk()">讓米米說話</button>

<div id="output">（等待啟動）</div>

<script>
async function talk() {
  const output = document.getElementById("output");
  output.innerText = "連線中...";

  try {
    const res = await fetch("https://mimi-home.vercel.app/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "請用可愛又吐槽的語氣介紹量子醫院",
        agentName: "米米"
      })
    });

    const data = await res.json();

    if (data.reply) {
      output.innerText = data.reply;
    } else {
      output.innerText = "⚠️ API 回應異常\n" + JSON.stringify(data);
    }

  } catch (err) {
    output.innerText = "❌ 連線失敗";
  }
}
</script>

</body>
</html>
