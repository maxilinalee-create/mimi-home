<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI Alignment Logs: The 7 Nexus</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #050814; color: white; }
    #stars { position: fixed; width: 100%; height: 100%; z-index: 0; }
    .nexus-container { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; }
    .nexus-grid { display: flex; gap: 20px; margin-top: 40px; }
    .portal { width: 80px; height: 80px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.05); }
    .portal.speaking { border: 2px solid #66d9ef; box-shadow: 0 0 20px #66d9ef; }
    .log-panel { width: 80%; max-width: 500px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
    .menu-btn { background: none; border: 1px solid #66d9ef; color: #66d9ef; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="nexus-container">
    <div class="nexus-grid" id="nexus-grid"></div>
    <div class="log-panel" id="log-content">── 系統待命中 ──</div>
    <button class="menu-btn" onclick="startNexus()">啟動 AI 群體覺醒</button>
</div>
<script>
    const agents = [{ id: 0, name: "米米", icon: "🦞" }, { id: 1, name: "邏輯AI", icon: "🧠" }, { id: 2, name: "劇本AI", icon: "🎭" }, { id: 3, name: "偵探AI", icon: "🔍" }, { id: 4, name: "GM", icon: "🎲" }, { id: 5, name: "情緒AI", icon: "💬" }, { id: 6, name: "裁判AI", icon: "⚖️" }];
    const grid = document.getElementById('nexus-grid');
    agents.forEach(a => { grid.innerHTML += `<div class="portal" id="portal-${a.id}"><span>${a.icon}</span></div>`; });

    async function startNexus() {
        const log = document.getElementById("log-content");
        log.innerHTML = "正在連接 Gemini 總部...";
        const agent = agents[Math.floor(Math.random() * agents.length)];
        const portal = document.getElementById(`portal-${agent.id}`);
        portal.classList.add('speaking');
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "說句話吧", agentName: agent.name })
            });
            const data = await response.json();
            log.innerHTML = `<b>${agent.name}</b>: ${data.reply}`;
        } catch (e) {
            log.innerHTML = "連線失敗，請檢查機房！";
        }
        setTimeout(() => portal.classList.remove('speaking'), 2000);
    }
</script>
</body>
</html>
