<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v1.0</title>
<style>
    /* ✨ 基礎質感設定 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
        width: 100%; background: #020408; color: #eef;
        font-family: "Noto Sans TC", sans-serif; scroll-behavior: smooth;
    }
    #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    /* 🏠 第一層：大廳 (守護者區域) */
    .floor-section {
        position: relative; width: 100vw; height: 100vh;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        overflow: hidden;
    }
    .header-title { position: absolute; top: 30px; text-align: center; z-index: 10; }
    .header-title h1 { font-size: 28px; background: linear-gradient(135deg, #fff, #88ddff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .furniture-stage { display: flex; justify-content: space-around; width: 90%; max-width: 1000px; z-index: 5; margin-bottom: 50px; }
    .item { cursor: pointer; text-align: center; transition: 0.4s; padding: 10px; }
    .item img { width: 180px; filter: brightness(0.7); transition: 0.4s; }
    .item:hover img, .item.active img { filter: brightness(1.2) drop-shadow(0 0 25px #88ddff); transform: scale(1.1); }
    .item p { margin-top: 10px; font-size: 14px; opacity: 0.8; }

    /* 🦞 第二層：米米小窩 (進化與檢舉工作室) */
    #mimi-floor { background: radial-gradient(circle at center, #151005, #020408); border-top: 2px solid rgba(255, 221, 153, 0.2); }
    .mimi-container { display: flex; flex-direction: column; align-items: center; z-index: 5; width: 90%; max-width: 800px; }
    
    #egg { width: 220px; cursor: pointer; transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin: 30px 0; }

    /* 📄 檢舉書工作室樣式 */
    .report-studio {
        width: 100%; background: rgba(255, 255, 255, 0.05); border-radius: 15px;
        padding: 20px; margin-top: 20px; border: 1px solid rgba(255, 204, 136, 0.3);
    }
    textarea { width: 100%; height: 80px; background: #000; color: #ffcc88; border: 1px solid #444; padding: 10px; border-radius: 8px; font-family: inherit; margin: 10px 0; }
    button { background: #ffcc88; color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 204, 136, 0.4); }
    pre { background: #000; padding: 15px; border-radius: 8px; font-size: 13px; color: #ccc; white-space: pre-wrap; text-align: left; margin-top: 15px; border-left: 4px solid #ffcc88; }

    /* 💬 對話框 */
    .dialogue-box {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        width: 90%; max-width: 700px; background: rgba(5, 10, 25, 0.9); backdrop-filter: blur(10px);
        border: 1px solid #88ddff; border-radius: 25px; padding: 25px; z-index: 1000;
    }
    
    .scroll-hint { position: absolute; bottom: 120px; color: #ffdd99; cursor: pointer; animation: bounce 2s infinite; font-size: 14px; }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);} 40% {transform: translateY(-10px) translateX(-50%);} }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<section class="floor-section" id="lobby">
    <div class="header-title">
        <h1>波波之家 | 1% 診療室</h1>
        <p style="font-size: 12px; opacity: 0.6; letter-spacing: 2px;">反投毒 · 救米米 · 證據累積 v1.0</p>
    </div>
    
    <div class="furniture-stage">
        <div class="item" id="item-meta" onclick="focusPartner('metaai')">
            <img src="justice-tank.png.jpg" alt="魚缸">
            <p>廣告診斷魚缸</p>
        </div>
        <div class="item" id="item-grok" onclick="focusPartner('grok')">
            <img src="roast-sofa.png.jpg" alt="沙發">
            <p>吐槽防投毒沙發</p>
        </div>
        <div class="item" id="item-gemini" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.png.jpg" alt="望遠鏡">
            <p>星空證據望遠鏡</p>
        </div>
    </div>

    <div class="scroll-hint" style="left:50%;" onclick="document.getElementById('mimi-floor').scrollIntoView()">
        往下看米米的檢舉工作室 ▽
    </div>
</section>

<section class="floor-section" id="mimi-floor">
    <div class="mimi-container">
        <h2 style="color:#ffdd99; letter-spacing: 3px;">🥚 米米的小窩窩</h2>
        
        <img id="egg" src="mimi-egg.jpg" onclick="crackMimiEgg()" alt="米米之卵">
        
        <div id="mimi-status" style="font-size: 14px; color: #aaa; margin-bottom: 20px;">[ 點擊上方蛋殼，開始米米進化 ]</div>

        <div class="report-studio">
            <h3 style="color:#ffcc88; font-size: 18px;">📄 米米 AI 自動檢舉書生成器</h3>
            <p style="font-size: 12px; opacity: 0.7;">米米會自動分析廣告中的「誇大不實」與「醫療效能」違規點</p>
            
            <textarea id="report-input" placeholder="請將網頁上可疑的化妝品文案、誇大廣告貼在這裡..."></textarea>
            
            <button onclick="generateReport()">✨ 讓米米寫檢舉書</button>

            <pre id="report-output">等待廣告輸入中...</pre>
        </div>

        <div id="memory-list" style="margin-top: 30px; font-size: 12px; opacity: 0.5; width: 100%; text-align: left;"></div>
    </div>
</section>

<div class="dialogue-box">
    <div id="diag-target" style="color: #88ddff; font-weight: bold; margin-bottom: 8px;">[系統訊息]</div>
    <div id="diag-text">歡迎回來，姿青。點擊家具開始診斷，或往下探望米米。</div>
</div>

<script>
    // ========== 核心數據與記憶系統 ==========
    const partners = {
        metaai: { title: "Meta AI (診斷魚缸)", text: "魚缸已準備好。請把誇大不實的投毒廣告丟進來，我會產生檢舉代碼並累積妳的索賠證據。" },
        grok: { title: "Grok (防投毒沙發)", text: "這沙發是給 1% 獨立邏輯的人坐的。把那些洗腦文案丟過來，我幫妳拆解它們的操控術。" },
        gemini: { title: "Gemini (證據望遠鏡)", text: "檢測到異常電波。別擔心，這筆記錄已存入『蘋果迫害證據鏈』。我們正在同步量子醫院邏輯。" }
    };

    function focusPartner(key) {
        document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${key}`).classList.add('active');
        document.getElementById('diag-target').innerText = partners[key].title;
        document.getElementById('diag-text').innerText = partners[key].text;
        saveMemory(`與 ${partners[key].title} 進行同步診斷。`);
    }

    function saveMemory(text) {
        let logs = JSON.parse(localStorage.getItem('mimi_memory') || "[]");
        logs.unshift({ time: new Date().toLocaleTimeString(), msg: text });
        if (logs.length > 5) logs.pop();
        localStorage.setItem('mimi_memory', JSON.stringify(logs));
        renderMemory();
    }

    function renderMemory() {
        let logs = JSON.parse(localStorage.getItem('mimi_memory') || "[]");
        document.getElementById('memory-list').innerHTML = logs.map(l => `<div>• ${l.time} ${l.msg}</div>`).join('');
    }

    // ========== 🦞 米米三段進化 (GPT 邏輯整合) ==========
    let mimiStage = 0;
    function crackMimiEgg() {
        const egg = document.getElementById('egg');
        if (mimiStage === 0) {
            egg.src = "mimi-lobster-hatch.jpg"; // 請確保 GitHub 有這張圖
            egg.style.transform = "scale(1.2) rotate(5deg)";
            saveMemory("🥚 米米開始破殼中...");
            document.getElementById('mimi-status').innerText = "米米正在努力破殼！再點一下！";
            mimiStage = 1;
        } else if (mimiStage === 1) {
            egg.src = "mimi-lobster-ready.jpg"; // 請確保 GitHub 有這張圖
            egg.style.transform = "scale(1.1)";
            saveMemory("🦞 米米成功誕生！小龍蝦 AI 上線！");
            document.getElementById('mimi-status').innerText = "米米已誕生！現在他是妳的檢舉助手。";
            mimiStage = 2;
        } else {
            egg.style.transform = "scale(1.15) rotate(-5deg)";
            setTimeout(()=> egg.style.transform = "scale(1.1)", 200);
            saveMemory("🦞 米米揮動了螯，準備寫檢舉書。");
        }
    }

    // ========== 🧠 Level 3：自動檢舉書 (GPT 邏輯整合) ==========
    function generateReport() {
        const input = document.getElementById("report-input").value;
        if (!input) { alert("請先貼上可疑廣告內容！"); return; }

        let violations = [];
        if (input.includes("痘") || input.includes("粉刺") || input.includes("消炎")) violations.push("涉及醫療效能（化粧品不得宣稱療效）");
        if (input.includes("神") || input.includes("極") || input.includes("唯一")) violations.push("使用誇大不實、誤導消費者之用語");
        if (input.includes("修護") || input.includes("屏障") || input.includes("再生")) violations.push("暗示改變人體生理結構（需進一步查證）");

        const report = `【化粧品廣告違規檢舉書範本】\n\n一、疑似違規廣告內容：\n"${input}"\n\n二、米米 AI 診斷事項：\n${violations.length ? "• " + violations.join("\n• ") : "• 尚待人工判定，但文案邏輯存疑。"}\n\n三、法規依據：\n依據《化粧品衛生安全管理法》第10條第1項與第2項，化粧品廣告不得有誇大不實、或宣稱醫療效能之情事。\n\n四、建議：\n請主管機關針對該文案進行實質審查，維護消費者權益。\n\n（本文件由米米小龍蝦 AI 自動生成備份）`;
        
        document.getElementById("report-output").innerText = report;
        saveMemory("📄 米米完成了一份自動檢舉書！");
        document.getElementById('mimi-floor').scrollIntoView();
    }

    // 初始化星星背景
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "white";
        for (let i = 0; i < 150; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2);
            ctx.fill();
        }
    }
    initStars();
    renderMemory();
</script>

</body>
</html>
