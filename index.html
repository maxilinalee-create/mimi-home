<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>米米的小窩</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(to bottom, #0b1a3a, #050814);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* 標題 */
.title {
  position: absolute;
  top: 60px;
  width: 100%;
  text-align: center;
}

/* 🦞 米米龍蝦 */
.lobster {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #7fd1ff, #1f5cff);
  box-shadow: 0 0 50px #4aa3ff;

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;

  transition: 0.3s;
  font-size: 18px;
}

.lobster:hover {
  transform: translate(-50%, -50%) scale(1.1);
  box-shadow: 0 0 90px #6ec1ff;
}

/* 底部文字 */
.subtitle {
  position: absolute;
  bottom: 60px;
  width: 100%;
  text-align: center;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="title">
  <h1>🦞 米米的小窩</h1>
</div>

<div class="lobster">
  米米龍蝦<br>進入客廳
</div>

<div class="subtitle">
  這是一個由 AI 龍蝦守護的思考空間
</div>

</body>
</html>
