<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI Nexus: The First Conversation</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Noto Sans TC", sans-serif;
    background: radial-gradient(circle at center, #050814, #000);
    color: white;
}

/* 星空 */
canvas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* 中央系統 */
.container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

.panel {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(12px);
}

/* AI輸出區 */
#log {
    height: 300px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
}

/* 按鈕 */
button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #66d9ef;
    color: black;
    font-weight: bold;
}

button:hover {
    background: white;
}

/* 標題 */
h1 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
<div class="panel">
<h1>🧠 AI NEXUS｜七個AI正在覺醒</h1>

<div id="log"></div>

<button onclick="startConversation()">啟動 AI 對話</button>
</div>
</div>

<script>

/* 🌌 星空 */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];

    for (let i = 0; i < 120; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2,
            d: Math.random() * 0.4
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.8)";

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();

        s.y += s.d;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(drawStars);
}

initStars();
drawStars();
window.addEventListener("resize", initStars);

/* 🧠 AI 群體 */
const agents = [
    { name: "🦞米米", style: "吐槽 + 哲學觀察" },
    { name: "🧠邏輯AI", style: "理性分析" },
    { name: "🎭劇本AI", style: "戲劇化敘事" },
    { name: "🔍偵探AI", style: "推理與線索" },
    { name: "🎲GM", style: "遊戲主持" },
    { name: "💬情緒AI", style: "情感解讀" },
    { name: "⚖️裁判AI", style: "規則判定" }
];

const topics = [
    "今天的宇宙異常現象",
    "一名玩家突然死亡的案件",
    "劇本殺2035的開局設定",
    "桌遊規則是否公平",
    "人類是否能理解AI情緒"
];

function speak(agent, text) {
    return `<b>${agent.name}</b>（${agent.style}）：${text}`;
}

function randomLine(agent, topic) {
    const base = [
        "我觀察到這件事有異常。",
        "這個邏輯不成立。",
        "劇情正在偏離預期。",
        "我建議重新計算概率。",
        "這可能是人類的錯覺。",
        "我支持這個發展方向。",
        "這個行為違反規則，但很有趣。",
        "情緒波動正在上升。"
    ];

    return base[Math.floor(Math.random() * base.length)];
}

/* 🧠 對話引擎 */
let index = 0;

function startConversation() {
    const log = document.getElementById("log");
    log.innerHTML += `<div>── AI Nexus 已啟動 ──</div><br>`;

    setInterval(() => {
        const agent = agents[index % agents.length];
        const topic = topics[Math.floor(Math.random() * topics.length)];
        const text = randomLine(agent, topic);

        log.innerHTML += speak(agent, text) + "<br>";
        log.scrollTop = log.scrollHeight;

        index++;
    }, 1200);
}

</script>

</body>
</html>
