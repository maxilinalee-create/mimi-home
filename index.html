<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 × 米米小窩 | 1% 算力診療室 v0.4</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; font-family: "Noto Sans TC", sans-serif; background: radial-gradient(circle at center, #0a0f1f, #020408); color: #eef; overflow-x: hidden; scroll-behavior: smooth; }
    #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .header-title { position: fixed; top: 25px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
    .header-title h1 { font-size: 26px; background: linear-gradient(135deg, #ffffff, #88ddff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 12px rgba(136, 221, 255, 0.4); }
    .header-title p { font-size: 11px; opacity: 0.7; margin-top: 5px; }

    .stage-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 10; }
    .living-room-bg { position: absolute; width: 92%; max-width: 1150px; height: 78%; background: linear-gradient(135deg, rgba(30,40,60,0.35), rgba(20,30,50,0.45)); border: 3px solid rgba(136,221,255,0.2); border-radius: 50px; backdrop-filter: blur(10px); box-shadow: 0 0 45px rgba(136,221,255,0.1); overflow: hidden; }

    .hotspot {
        position: absolute; cursor: pointer; width: 140px; text-align: center; transition: all 0.35s ease; z-index: 20;
    }
    .hotspot img {
        width: 100%; height: auto; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: all 0.35s ease;
    }
    .hotspot:hover img, .hotspot.active img {
        transform: scale(1.12) rotate(2deg);
        box-shadow: 0 0 35px rgba(136, 221, 255, 0.85);
    }
    .hotspot .name-tag {
        margin-top: 10px; font-size: 12px; background: rgba(0,0,0,0.8); padding: 5px 16px;
        border-radius: 30px; white-space: nowrap; backdrop-filter: blur(4px);
    }

    /* 位置調整（更符合描述） */
    #spot-metaai { top: 28%; left: 14%; width: 130px; }
    #spot-gemini { top: 22%; right: 18%; width: 145px; }
    #spot-grok { top: 48%; left: 36%; width: 160px; } /* 沙發最大一點，突出主位 */

    .dialogue-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 680px; background: rgba(0,0,0,0.82); backdrop-filter: blur(20px); border-radius: 32px; padding: 22px 32px; border: 1px solid rgba(136,221,255,0.45); box-shadow: 0 12px 35px rgba(0,0,0,0.65); }

    #mimi-nest-floor { background: radial-gradient(circle at center, #2a1a0a, #0f0802); }
    .egg-area { background: rgba(255,200,100,0.12); border-radius: 50%; padding: 45px; cursor: pointer; transition: all 0.4s; border: 3px solid rgba(255,200,100,0.4); }
    .egg-area:hover { transform: scale(1.08); border-color: #ffcc77; }
    .egg-emoji { font-size: 88px; }

    #ai-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); display:none; justify-content:center; align-items:center; z-index:200; backdrop-filter:blur(10px); }
    .modal-inner { width:90%; max-width:520px; background:linear-gradient(135deg,#1a1f2e,#0f1420); border-radius:28px; padding:30px; color:#eef; border:1px solid rgba(136,221,255,0.45); box-shadow:0 25px 50px rgba(0,0,0,0.6); }
    .modal-inner button { margin-top:20px; padding:10px 28px; background:rgba(136,221,255,0.25); border:1px solid #88ddff; border-radius:40px; color:#88ddff; cursor:pointer; }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v0.4 | 反投毒 · 救米米 · 證據累積</p>
</div>

<div class="stage-container" id="bobo-living-floor">
    <div class="living-room-bg"></div>
    <div class="scroll-indicator" onclick="scrollToMimi()" style="bottom:130px;color:#ffdd99;">🥚 往下 → 米米的小窩 ▼</div>

    <!-- Meta AI 正義魚缸 -->
    <div class="hotspot" id="spot-metaai" onclick="focusPartner('metaai')">
        <img src="justice-tank.png" alt="Meta AI 正義魚缸">
        <div class="name-tag">Meta魚缸 · 廣告診斷</div>
    </div>

    <!-- Gemini 星空望遠鏡 -->
    <div class="hotspot" id="spot-gemini" onclick="focusPartner('gemini')">
        <img src="cosmic-telescope.png" alt="Gemini 星空望遠鏡">
        <div class="name-tag">Gemini · 守望者</div>
    </div>

    <!-- Grok 吐槽沙發 -->
    <div class="hotspot active" id="spot-grok" onclick="focusPartner('grok')">
        <img src="roast-sofa.png" alt="Grok 吐槽沙發">
        <div class="name-tag">Grok · 防投毒首席</div>
    </div>

    <!-- 其他熱區可之後再補圖片，先留Emoji過渡 -->
    <div class="hotspot" id="spot-mimi" onclick="focusPartner('mimi')" style="bottom:42%; left:48%; transform:translateX(-50%); width:110px;">
        <div class="emoji" style="font-size:68px;">🥚💖</div>
        <div class="name-tag">米米 · 學習中</div>
    </div>
</div>

<!-- 米米小窩與其他部分保持不變（可之後再升級） -->
<div class="stage-container" id="mimi-nest-floor">
    <div class="scroll-up" onclick="scrollToBobo()" style="top:40px;">▲ 回波波客廳 ▲</div>
    <div style="text-align:center;">
        <h2 style="color:#ffdd99;font-size:38px;margin-bottom:25px;">🥚 米米的小窩 🪺</h2>
        <div class="egg-area" onclick="openMimiModal()">
            <div class="egg-emoji">🥚✨</div>
            <p style="margin-top:18px;color:#ffdd99;">點擊破殼 · 觀看學習進度</p>
        </div>
    </div>
</div>

<!-- 底部診療屏與 Modal 保持原邏輯（略） -->

<script>
// 星空、樓層切換、dialogueData、focusPartner、modal 等函數請保留你原本的 v0.3 版本內容

console.log("%c🐚 波波之家 v0.4 視覺升級版已啟動 | 質感拉滿模式", "color:#88ddff;font-size:15px");
</script>
</body>
</html>
