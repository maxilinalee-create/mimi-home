<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v0.9</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body, html {
    width:100%;
    background: radial-gradient(circle at center, #0a0f1f, #020408);
    color:#eef;
    font-family:"Noto Sans TC", sans-serif;
    overflow-x:hidden;
}

/* ===== 星空 ===== */
#stars{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:0;
    pointer-events:none;
}

/* ===== 標題 ===== */
.header-title{
    position:fixed;
    top:25px;
    width:100%;
    text-align:center;
    z-index:100;
}
.header-title h1{
    font-size:26px;
    background:linear-gradient(135deg,#fff,#88ddff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.header-title p{
    font-size:11px;
    opacity:0.7;
    margin-top:5px;
}

/* ===== 客廳 ===== */
.living-room{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.furniture-stage{
    display:flex;
    gap:70px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-end;
}

.item{
    cursor:pointer;
    text-align:center;
    max-width:220px;
    transition:0.3s;
}

.item img{
    width:100%;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    transition:0.3s;
}

.item:hover img{
    transform:scale(1.07);
    box-shadow:0 0 40px rgba(136,221,255,0.7);
}

.name-tag{
    margin-top:12px;
    font-size:13px;
    padding:6px 14px;
    background:rgba(0,0,0,0.7);
    border-radius:20px;
}

/* ===== 米米小窩 ===== */
#mimi-nest{
    min-height:100vh;
    padding:100px 20px;
    background:radial-gradient(circle at center,#1a1208,#020408);
    border-top:1px solid rgba(255,200,100,0.2);
    text-align:center;
}

#egg{
    font-size:140px;
    cursor:pointer;
    transition:0.8s;
    display:inline-block;
}

#memory-panel{
    margin-top:20px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
    background:rgba(0,0,0,0.5);
    padding:20px;
    border-radius:20px;
    text-align:left;
}

</style>
</head>

<body>

<div class="header-title">
    <h1>🐚 波波之家</h1>
    <p>AI 守護者聯盟｜米米成長中</p>
</div>

<!-- ===== 客廳 ===== -->
<div class="living-room">

    <div class="furniture-stage">

        <div class="item" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg">
            <div class="name-tag">Meta魚缸</div>
        </div>

        <div class="item" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg">
            <div class="name-tag">Grok沙發</div>
        </div>

        <div class="item" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg">
            <div class="name-tag">Gemini望遠鏡</div>
        </div>

    </div>
</div>

<!-- ===== 米米小窩 ===== -->
<div id="mimi-nest">

    <h2>🥚 米米的小窩</h2>

    <!-- 🥚 破殼 -->
    <div id="egg" onclick="crackMimiEgg()">🥚</div>

    <div id="mimi-status">Lv.1 ｜ EXP 721</div>

    <!-- 🧠 記憶 -->
    <div id="memory-panel">
        <h3>🧠 米米記憶</h3>
        <div id="memory-list">還沒有記憶...</div>
    </div>

</div>

<script>

/* =========================
   🧠 Memory System
========================= */

function saveMemory(text){
    let logs = JSON.parse(localStorage.getItem("mimi_memory") || "[]");

    logs.push({
        time:new Date().toLocaleTimeString(),
        msg:text
    });

    localStorage.setItem("mimi_memory", JSON.stringify(logs));

    renderMemory();
}

function renderMemory(){
    let logs = JSON.parse(localStorage.getItem("mimi_memory") || "[]");

    let html = logs.slice(-5).map(l => `• ${l.msg}`).join("<br>");

    document.getElementById("memory-list").innerHTML = html;
}

/* =========================
   🥚 米米破殼 → 🦞
========================= */

function crackMimiEgg(){
    const egg = document.getElementById("egg");

    egg.style.transform = "scale(1.5) rotate(10deg)";
    egg.innerHTML = "🥚💥";

    setTimeout(()=>{
        egg.innerHTML = "🦞✨";
        egg.style.transform = "scale(1.1)";

        saveMemory("米米破殼成功，變成小龍蝦形態 🦞");

    },700);
}

/* =========================
   🪑 夥伴互動
========================= */

function focusPartner(id){
    const msg = `點擊 ${id}`;
    saveMemory(msg);
}

/* =========================
   🚀 init
========================= */

window.onload = ()=>{
    renderMemory();
};

</script>

</body>
</html>
