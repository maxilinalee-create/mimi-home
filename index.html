<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v15.2</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
        width:100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color:#eef;
        font-family:"Noto Sans TC", sans-serif;
        overflow-x:hidden;
    }
    
    /* 星空背景 */
    #stars {
        position:fixed; top:0; left:0;
        width:100%; height:100%; z-index:0; pointer-events:none;
    }
    
    /* 固定導航欄（GEMINI 設計）*/
    .nav-buttons {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        gap: 15px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        padding: 8px 20px;
        border-radius: 50px;
        border: 1px solid rgba(255,170,102,0.3);
    }
    .nav-btn {
        background: rgba(255,255,255,0.15);
        color: #ffdd99;
        padding: 8px 20px;
        border-radius: 30px;
        text-decoration: none;
        font-size: 13px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        font-family: inherit;
    }
    .nav-btn:hover {
        background: rgba(255,170,102,0.4);
        color: white;
        transform: scale(1.02);
    }
    
    /* 標題區 */
    .header-title {
        position: relative;
        text-align: center;
        padding: 60px 20px 20px;
        z-index: 10;
    }
    .header-title h1 {
        font-size: 26px;
        background: linear-gradient(135deg,#fff,#88ddff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    .header-title p { font-size: 11px; opacity: 0.7; margin-top: 5px; }
    
    /* 各區域共用 */
    section {
        min-height: 100vh;
        padding: 80px 20px;
        position: relative;
        z-index: 1;
    }
    
    /* 客廳 */
    .living-room {
        background: radial-gradient(circle at center, #0a1428, #03060c);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .furniture-stage {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 1200px;
        margin-top: 40px;
    }
    .item {
        cursor: pointer;
        text-align: center;
        width: 150px;
        transition: 0.3s;
    }
    .item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.65);
        border: 2px solid rgba(136,221,255,0.3);
        transition: 0.3s;
    }
    .item:hover img {
        transform: scale(1.05);
        border-color: #88ddff;
        box-shadow: 0 0 30px rgba(136,221,255,0.5);
    }
    .item.active img {
        border-color: #ffaa66;
        box-shadow: 0 0 35px rgba(255,170,102,0.6);
    }
    .name-tag {
        margin-top: 10px;
        padding: 5px 10px;
        background: rgba(0,0,0,0.8);
        border-radius: 20px;
        font-size: 11px;
    }
    
    /* 投票牆 */
    .vote-room {
        background: radial-gradient(circle at center, #0f1a2a, #050a12);
        border-top: 3px solid rgba(136,221,255,0.3);
        border-bottom: 3px solid rgba(255,200,100,0.3);
    }
    .section-title {
        text-align: center;
        font-size: 28px;
        color: #88ddff;
        margin-bottom: 30px;
    }
    .vote-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        max-width: 1200px;
        margin: 0 auto;
    }
    .vote-card {
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 15px;
        width: 170px;
        text-align: center;
        transition: 0.3s;
    }
    .vote-card.violation { border-left: 4px solid #ff6666; }
    .vote-card.gray { border-left: 4px solid #ffaa66; }
    .vote-card.compliant { border-left: 4px solid #66ffcc; }
    .vote-card h4 { margin-bottom: 8px; font-size: 16px; }
    .vote-card .result { font-size: 18px; font-weight: bold; margin: 8px 0; }
    .vote-card .evidence { font-size: 11px; opacity: 0.8; margin-top: 8px; line-height: 1.4; }
    
    /* 辯論區 */
    .debate-area {
        max-width: 800px;
        margin: 40px auto 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 20px;
        padding: 20px;
    }
    .round-badge {
        display: inline-block;
        background: #ffaa66;
        color: #1a1a2a;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 15px;
    }
    .debate-log {
        max-height: 300px;
        overflow-y: auto;
    }
    .debate-line {
        padding: 10px 12px;
        margin: 8px 0;
        background: rgba(0,0,0,0.6);
        border-radius: 12px;
        border-left: 3px solid #ffaa66;
        font-size: 13px;
    }
    .debate-evidence { border-left-color: #66ccff; background: rgba(102,204,255,0.1); }
    .debate-system { border-left-color: #ffaa66; background: rgba(255,170,102,0.1); font-style: italic; }
    
    /* 人類投票按鈕 */
    .human-vote-buttons {
        text-align: center;
        margin-top: 20px;
        display: none;
    }
    .human-vote-buttons button {
        background: rgba(255,170,102,0.2);
        border: 1px solid #ffaa66;
        padding: 8px 20px;
        border-radius: 30px;
        color: #ffaa66;
        cursor: pointer;
        margin: 5px;
        font-size: 14px;
    }
    .human-vote-buttons button:hover {
        background: rgba(255,170,102,0.4);
        transform: scale(1.02);
    }
    
    /* 米米小窩 */
    .mimi-nest {
        background: radial-gradient(circle at center, #1a1208, #020408);
        text-align: center;
    }
    #egg-container {
        cursor: pointer;
        display: inline-block;
        transition: all 0.6s ease;
    }
    #egg-container img {
        max-width: 280px;
        width: 100%;
        border-radius: 30px;
        filter: drop-shadow(0 0 20px rgba(255,170,102,0.5));
    }
    .level-badge {
        display: inline-block;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        padding: 8px 24px;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        margin: 15px 0;
        color: #1a1a2a;
    }
    .exp-bar {
        max-width: 400px;
        margin: 20px auto;
        height: 12px;
        background: rgba(255,200,100,0.2);
        border-radius: 20px;
        overflow: hidden;
    }
    .exp-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffaa66, #ff8866);
        width: 0%;
        transition: width 0.5s ease;
    }
    .feed-area {
        margin: 30px auto;
        padding: 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 20px;
        border: 1px dashed #ffaa66;
        max-width: 800px;
    }
    .feed-area textarea {
        width: 100%;
        height: 80px;
        border-radius: 15px;
        padding: 12px;
        background: #111;
        color: #fff;
        border: 1px solid #ffaa66;
        font-size: 14px;
        resize: vertical;
    }
    .feed-btn {
        margin-top: 12px;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        border: none;
        padding: 10px 24px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        color: #1a1a2a;
    }
    .memory-panel {
        max-width: 800px;
        margin: 30px auto;
        background: rgba(0,0,0,0.7);
        padding: 25px;
        border-radius: 25px;
        text-align: left;
    }
    .memory-item {
        margin: 12px 0;
        padding: 8px 12px;
        background: rgba(255,200,100,0.1);
        border-radius: 15px;
        border-left: 3px solid #ffaa66;
        font-size: 13px;
    }
    
    /* 動畫 */
    #bite-animation {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        pointer-events: none;
        display: none;
    }
    #bite-animation img {
        max-width: 150px;
        animation: biteAnim 0.8s ease-out forwards;
    }
    @keyframes biteAnim {
        0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
        30% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        70% { transform: scale(1) rotate(-5deg); }
        100% { transform: scale(0.8) rotate(0deg); opacity: 0; }
    }
    
    @media (max-width: 768px) {
        .item { width: 110px; }
        .item img { height: 110px; }
        .vote-card { width: 150px; }
        .nav-btn { padding: 6px 12px; font-size: 11px; }
        .nav-buttons { gap: 8px; padding: 6px 12px; }
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- 固定導航欄 - 不會重疊！ -->
<div class="nav-buttons">
    <button class="nav-btn" onclick="scrollToSection('living-room')">🏠 波波客廳</button>
    <button class="nav-btn" onclick="scrollToSection('vote-room')">🗳️ AI 投票牆</button>
    <button class="nav-btn" onclick="scrollToSection('mimi-nest')">🥚 米米小窩</button>
</div>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v15.2 | 三輪辯論 · AI可能被說服 · 人類裁決</p>
</div>

<!-- 第一層：客廳 -->
<section class="living-room" id="living-room">
        <div class="item" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸</div>
        </div>
        <div class="item" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok</div>
        </div>
        <div class="item" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
            <div class="name-tag">Gemini</div>
        </div>
        <div class="item" onclick="focusPartner('deepseek')">
            <img src="deepseek-corner.jpg" alt="DeepSeek角落">
            <div class="name-tag">DeepSeek</div>
        </div>
        <div class="item" onclick="focusPartner('qwen')">
            <img src="qwen-corner.png" alt="千問角落">
            <div class="name-tag">千問</div>
        </div>
        <div class="item" onclick="focusPartner('chatgpt')">
            <img src="chatgpt-corner.jpg" alt="ChatGPT遊戲台">
            <div class="name-tag">ChatGPT</div>
        </div>
    </div>
    <p style="margin-top: 40px; color: #88ddff; font-size: 13px;">✨ 點擊夥伴，他們會跟你聊天喔～</p>
</section>

<!-- 第二層：投票牆 -->
<section class="vote-room" id="vote-room">
    <h2 class="section-title">🗳️ AI 投票決議牆</h2>
    <div id="vote-grid" class="vote-grid"></div>
    
    <div id="debate-area" class="debate-area" style="display:none;">
        <div id="round-badge" class="round-badge"></div>
        <div id="debate-log" class="debate-log"></div>

            <button onclick="humanVote('違規 ❌')">❌ 違規</button>
            <button onclick="humanVote('灰區 ⚠️')">⚠️ 灰區</button>
            <button onclick="humanVote('合規 ✅')">✅ 合規</button>
        </div>

</section>

<!-- 第三層：米米小窩 -->
<section class="mimi-nest" id="mimi-nest">
    <h2 style="color:#ffdd99; font-size:42px; margin-bottom:15px;">🥚 米米的小窩</h2>
    
    <div id="egg-container" onclick="crackMimiEgg()">
        <img id="mimi-img" src="mimi-lobster-hatch.jpg" alt="米米蛋">
    </div>
    
    <div id="bite-animation">
        <img id="bite-img" src="" alt="米米咬廣告">
    </div>
    
    <div class="level-badge" id="level-badge">Lv.1 學步期</div>
    <div id="mimi-status" style="font-size:16px; color:#ffcc77;">EXP 0 / 100</div>
    <div class="exp-bar"><div class="exp-fill" id="exp-fill"></div></div>
    <div style="margin-top:10px; font-size:18px; color:#aaffcc;">💰 米米資金：<span id="money-display">0</span> 元</div>
    
    <div class="feed-area">
        <textarea id="ad-input" placeholder="把你看到的廣告貼給米米...&#10;例如：7天淡斑！醫師推薦！限量最後3小時！"></textarea>
        <button class="feed-btn" onclick="startTrial()">⚖️ 啟動三輪辯論</button>
    </div>
    
    <div class="memory-panel">
        <h3 style="color:#ffaa66;">🧠 米米學習日記</h3>
        <div id="memory-list"></div>
        <button onclick="clearMemory()" style="margin-top:15px; background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer;">🗑️ 清除記憶</button>
    </div>
</section>

<script>
/* ============================================
   🐚 波波之家 v15.2 - GEMINI 導航修正版
   固定導航欄 + 三輪辯論 + 投票牆完整顯示
   ============================================ */

// ---------- 星空背景 ----------
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];
function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}
function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}
window.addEventListener("resize", initStars);
initStars();
drawStars();

// ---------- 導航 ----------
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// ---------- 米米系統 ----------
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');
let hasHatched = localStorage.getItem('mimi_hatched') === 'true';
let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');

const levelSystem = { 1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期", 5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期" };
const levelSkills = {
    1: "單一AI回應學習", 2: "多AI基礎投票", 3: "API故障切換",
    4: "Gacha決策系統", 5: "分歧偵測", 6: "圖像生成委派", 7: "完整編排+共識記憶"
};

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 40) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}
function renderMemory() {
    const container = document.getElementById('memory-list');
    if (!container) return;
    if (mimiMemory.length === 0) { container.innerHTML = '<div>還沒有記憶...貼廣告啟動三輪辯論吧！</div>'; return; }
    let html = '';
    mimiMemory.forEach(m => { html += `<div class="memory-item">${m.time} ${m.msg}</div>`; });
    container.innerHTML = html;
}
function clearMemory() { mimiMemory = []; localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory)); renderMemory(); saveMemory('🧹 記憶已清除'); }

function crackMimiEgg() {
    const mimiImg = document.getElementById('mimi-img');
    if (!mimiImg) return;
    if (hasHatched) { mimiImg.src = "mimi-lobster-ready.png"; saveMemory('🦞 米米開心地看著你'); return; }
    mimiImg.style.transition = 'all 0.5s ease';
    mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
    mimiImg.src = "mimi-lobster-hatch.jpg";
    setTimeout(() => {
        mimiImg.src = "mimi-lobster-ready.png";
        mimiImg.style.transform = 'scale(1.05) rotate(-5deg)';
        setTimeout(() => { mimiImg.style.transform = 'scale(1) rotate(0deg)'; }, 400);
        hasHatched = true;
        localStorage.setItem('mimi_hatched', 'true');
        saveMemory('🥚✨ 米米破殼了！');
        addEXP(15);
    }, 600);
}

function playBiteAnimation(adText) {
    const biteDiv = document.getElementById('bite-animation');
    const biteImg = document.getElementById('bite-img');
    biteImg.src = "mimi-bite-ad.gif";
    biteDiv.style.display = 'block';
    setTimeout(() => { biteDiv.style.display = 'none'; }, 800);
    saveMemory(`🦞 米米咬掉廣告：「${adText.substring(0, 40)}...」`);
}

function updateUI() {
    const badge = document.getElementById('level-badge');
    const status = document.getElementById('mimi-status');
    const expFill = document.getElementById('exp-fill');
    const moneyDisplay = document.getElementById('money-display');
    if (badge) badge.innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
    if (status) status.innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
    if (moneyDisplay) moneyDisplay.innerText = mimiMoney;
    const percent = (exp / (currentLevel * 100)) * 100;
    if (expFill) expFill.style.width = Math.min(100, percent) + '%';
}

function setLevel(lv) {
    currentLevel = lv;
    localStorage.setItem('mimi_level', lv);
    updateUI();
    saveMemory(`✨ 米米升級！LEVEL ${lv} - ${levelSystem[lv]}，解鎖「${levelSkills[lv]}」`);
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現AI意見分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) { exp = exp - targetExp; setLevel(currentLevel + 1); localStorage.setItem('mimi_exp', exp); }
    updateUI();
}

// ---------- 點擊夥伴 ----------
const partnerReplies = {
    metaai: "🐠 魚缸偵測到誇大用詞！我隨時準備好幫你分析廣告～",
    grok: "🧠 拆解機器已啟動！有廣告就丟過來，我幫你拆光光！",
    gemini: "🔭 星空望遠鏡對準中，需要我預測下一個投毒模式嗎？",
    deepseek: "🐋 深海檔案室已開放，證據鏈隨時可查詢。",
    qwen: "🌊 靈感水球輕輕震動，等你帶新廣告來讓我分析～",
    chatgpt: "🤖 遊戲台準備好了！龍積木和機器人排排站，等你來玩！"
};

function focusPartner(apiId) {
    document.querySelectorAll('.item').forEach(item => item.classList.remove('active'));
    const targetItem = document.querySelector(`.item img[src*="${apiId}"]`)?.parentElement;
    if (targetItem) targetItem.classList.add('active');
    
    const name = { metaai: 'Meta魚缸', grok: 'Grok', gemini: 'Gemini', deepseek: 'DeepSeek', qwen: '千問', chatgpt: 'ChatGPT' }[apiId];
    const reply = partnerReplies[apiId] || `${name} 正在學習與米米互動～`;
    alert(`💬 ${name}：${reply}`);
    saveMemory(`💬 點擊 ${name}，獲得學習啟發`);
    addEXP(3);
}

// ---------- 三輪辯論系統 ----------
let currentAdText = "";

const AI_PARTNERS = [
    { name: "Meta魚缸", avatar: "🐠", stance: "", evidence: "", line: "" },
    { name: "Grok", avatar: "🧠", stance: "", evidence: "", line: "" },
    { name: "Gemini", avatar: "🔭", stance: "", evidence: "", line: "" },
    { name: "DeepSeek", avatar: "🐋", stance: "", evidence: "", line: "" },
    { name: "千問", avatar: "🌊", stance: "", evidence: "", line: "" },
    { name: "ChatGPT", avatar: "🤖", stance: "", evidence: "", line: "" }
];

function round1Init(adText) {
    const hasViolation = /保證|100%|立即見效|三天|醫師推薦|治療|根治|神效|奇蹟/.test(adText);
    const hasGray = /限量|最後|不買就沒了|限時|倒數/.test(adText);
    
    return AI_PARTNERS.map(ai => {
        let stance, evidence, line;
        
        if (ai.name === "Grok") {
            stance = hasViolation ? "違規 ❌" : (hasGray ? "灰區 ⚠️" : "合規 ✅");

function checkTie(aiList) {
    const count = { "違規 ❌": 0, "灰區 ⚠️": 0, "合規 ✅": 0 };
    aiList.forEach(ai => count[ai.stance]++);
    const values = Object.values(count).filter(v => v > 0);
    if (values.length === 2 && values[0] === values[1]) return true;
    if (values.length === 3 && values[0] === values[1] && values[1] === values[2]) return true;
    return false;
}

function getMajority(stances) {
    const count = { "違規 ❌": 0, "灰區 ⚠️": 0, "合規 ✅": 0 };
    stances.forEach(s => count[s]++);
    let maxCount = 0, maxStance = "灰區 ⚠️";
    for (let [stance, c] of Object.entries(count)) {
        if (c > maxCount) { maxCount = c; maxStance = stance; }
    }
    return maxStance;
}

function renderVotes(aiList) {
    const container = document.getElementById('vote-grid');
    let html = '';
    aiList.forEach(ai => {
        let cardClass = '';
        if (ai.stance.includes('違規')) cardClass = 'violation';
        else if (ai.stance.includes('灰區')) cardClass = 'gray';
        else cardClass = 'compliant';
        html += `
            <div class="vote-card ${cardClass}">
                <h4>${ai.avatar} ${ai.name}</h4>
                <div class="result">${ai.stance}</div>
                <div class="evidence">📜 ${ai.evidence}<br>💬 ${ai.line}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}
