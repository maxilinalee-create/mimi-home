<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波之家 | 1% 守護者聯盟 v11.0</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
        width:100%; height:100%;
        background: radial-gradient(circle at center, #0a0f1f, #020408);
        color:#eef;
        font-family:"Noto Sans TC", sans-serif;
        overflow-x:hidden;
    }
    #stars {
        position:fixed; top:0; left:0;
        width:100%; height:100%; z-index:0; pointer-events:none;
    }
    .header-title {
        position:fixed; top:25px; width:100%; text-align:center; z-index:100;
        pointer-events: none;
    }
    .header-title h1 {
        font-size:26px;
        background:linear-gradient(135deg,#fff,#88ddff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    .header-title p { font-size:11px; opacity:0.7; margin-top:5px; }

    .living-room {
        position:relative; width:100vw; min-height:100vh; z-index:10;
        display:flex; justify-content:center; align-items:center; padding:100px 20px 60px;
    }
    .furniture-stage {
        display:flex; gap:40px; flex-wrap:wrap; justify-content:center; align-items:flex-end;
        max-width: 1200px;
    }
    .item {
        cursor:pointer; text-align:center; max-width:180px; transition:0.4s;
    }
    .item img {
        width:100%; max-width:170px; border-radius:20px;
        box-shadow:0 15px 40px rgba(0,0,0,0.65);
        transition: all 0.3s ease;
        border: 2px solid rgba(136,221,255,0.3);
    }
    .item:hover img {
        transform:scale(1.05);
        border-color: #88ddff;
        box-shadow:0 0 30px rgba(136,221,255,0.5);
    }
    .item.active img {
        border-color: #ffaa66;
        box-shadow: 0 0 35px rgba(255,170,102,0.6);
    }
    .name-tag {
        margin-top:10px; padding:5px 12px; background:rgba(0,0,0,0.8);
        border-radius:20px; font-size:11px; backdrop-filter: blur(5px);
    }

    /* 米米小窩 */
    #mimi-nest {
        min-height:100vh; padding:100px 20px; text-align:center;
        background:radial-gradient(circle at center,#1a1208,#020408);
        border-top:3px solid rgba(255,200,100,0.4);
    }

    #egg-container {
        cursor: pointer;
        display: inline-block;
        transition: all 0.6s ease;
        position: relative;
    }
    #egg-container img {
        max-width: 280px;
        width: 100%;
        border-radius: 30px;
        filter: drop-shadow(0 0 20px rgba(255,170,102,0.5));
        transition: all 0.3s ease;
    }
    #egg-container:hover img {
        transform: scale(1.05);
        filter: drop-shadow(0 0 30px rgba(255,170,102,0.8));
    }

    #bite-animation {
        position: fixed;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        pointer-events: none;
        display: none;
    }
    #bite-animation img {
        max-width: 200px;
        animation: biteAnim 0.8s ease-out forwards;
    }
    @keyframes biteAnim {
        0% { transform: scale(0.8) rotate(-15deg); opacity: 0; }
        20% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        60% { transform: scale(1) rotate(-5deg); }
        100% { transform: scale(0.9) rotate(0deg); opacity: 0; }
    }

    #memory-panel {
        max-width:800px; margin:30px auto; background:rgba(0,0,0,0.7);
        padding:25px; border-radius:25px; text-align:left;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,200,100,0.3);
    }
    .memory-item {
        margin:12px 0; padding: 8px 12px;
        background: rgba(255,200,100,0.1);
        border-radius: 15px;
        border-left: 3px solid #ffaa66;
    }
    .memory-time { font-size: 11px; color: #ffaa66; margin-right: 12px; }
    .memory-msg { font-size: 14px; }

    .exp-bar {
        max-width: 400px;
        margin: 20px auto;
        height: 12px;
        background: rgba(255,200,100,0.2);
        border-radius: 20px;
        overflow: hidden;
    }
    .exp-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffaa66, #ff8866);
        width: 0%;
        transition: width 0.5s ease;
        border-radius: 20px;
    }

    .level-badge {
        display: inline-block;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        padding: 8px 24px;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        margin: 15px 0;
        color: #1a1a2a;
    }

    .ai-dialogue {
        max-width: 500px;
        margin: 15px auto;
        padding: 12px 20px;
        background: rgba(0,0,0,0.7);
        border-radius: 25px;
        font-size: 14px;
        color: #aaffcc;
        border-left: 3px solid #ffaa66;
        text-align: left;
    }

    .feed-area {
        margin-top: 25px;
        padding: 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 20px;
        border: 1px dashed #ffaa66;
    }
    .feed-area textarea {
        width: 100%;
        height: 80px;
        border-radius: 15px;
        padding: 12px;
        background: #111;
        color: #fff;
        border: 1px solid #ffaa66;
        font-size: 14px;
        resize: vertical;
    }
    .feed-area textarea:focus {
        outline: none;
        border-color: #88ddff;
        box-shadow: 0 0 10px rgba(136,221,255,0.3);
    }
    .feed-btn {
        margin-top: 12px;
        background: linear-gradient(135deg, #ffaa66, #ff8866);
        border: none;
        padding: 10px 24px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        color: #1a1a2a;
        transition: all 0.2s;
    }
    .feed-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(255,170,102,0.5);
    }

    .scroll-down, .scroll-up {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-size: 12px; color: #ffdd99; cursor: pointer; z-index: 20;
        animation: pulse 2s infinite;
    }
    .scroll-down { bottom: 30px; }
    .scroll-up { top: 30px; }

    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    @media (max-width: 768px) {
        .furniture-stage { gap: 20px; }
        .item img { max-width: 120px; }
        #egg-container img { max-width: 220px; }
        .name-tag { font-size: 9px; padding: 4px 8px; }
    }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="header-title">
    <h1>🐚 波波之家 | 1% 守護者聯盟</h1>
    <p>算力診療室 v11.0 | 6位夥伴 · 投餵廣告 · 米米賺獎金</p>
</div>

<!-- 客廳 - 6位夥伴全員到齊！ -->
<div class="living-room" id="living-room">
    <div class="scroll-down" onclick="scrollToMimi()">🥚 往下 → 米米的小窩 ▼</div>
    <div class="furniture-stage">
        <!-- Meta 魚缸 -->
        <div class="item" id="item-metaai" onclick="focusPartner('metaai')">
            <img src="justice-tank.jpg" alt="Meta魚缸">
            <div class="name-tag">Meta魚缸 · 證據收集</div>
        </div>
        <!-- Grok 沙發 -->
        <div class="item" id="item-grok" onclick="focusPartner('grok')">
            <img src="roast-sofa.jpg" alt="Grok沙發">
            <div class="name-tag">Grok · 吐槽防毒</div>
        </div>
        <!-- Gemini 望遠鏡 -->
        <div class="item" id="item-gemini" onclick="focusPartner('gemini')">
            <img src="cosmic-telescope.jpg" alt="Gemini望遠鏡">
            <div class="name-tag">Gemini · 星空守望</div>
        </div>
        <!-- DeepSeek 深海歸檔 (Grok新畫) -->
        <div class="item" id="item-deepseek" onclick="focusPartner('deepseek')">
            <img src="deepseek-corner.jpg" alt="DeepSeek角落">
            <div class="name-tag">DeepSeek · 深海歸檔</div>
        </div>
        <!-- 千問 靈感湧泉 (Grok新畫) -->
        <div class="item" id="item-qwen" onclick="focusPartner('qwen')">
            <img src="qwen-corner.png" alt="千問角落">
            <div class="name-tag">千問 · 靈感湧泉</div>
        </div>
        <!-- ChatGPT 創作遊戲台 (Grok新畫) -->
        <div class="item" id="item-chatgpt" onclick="focusPartner('chatgpt')">
            <img src="chatgpt-corner.jpg" alt="ChatGPT遊戲台">
            <div class="name-tag">ChatGPT · 創作遊戲台</div>
        </div>
    </div>
</div>

<!-- 米米小窩 -->
<div id="mimi-nest">
    <div class="scroll-up" onclick="scrollToLiving()">▲ 回波波客廳 ▲</div>
    
    <h2 style="color:#ffdd99; font-size:42px; margin-bottom:15px;">🥚 米米的小窩</h2>
    
    <div id="egg-container" onclick="crackMimiEgg()">
        <img id="mimi-img" src="mimi-lobster-hatch.jpg" alt="米米蛋">
    </div>
    
    <div id="bite-animation">
        <img id="bite-img" src="" alt="米米咬廣告">
    </div>
    
    <div class="level-badge" id="level-badge">Lv.1 學步期</div>
    
    <div id="mimi-status" style="font-size:16px; color:#ffcc77; margin:10px 0;">
        EXP 0 / 100
    </div>
    
    <div class="exp-bar">
        <div class="exp-fill" id="exp-fill"></div>
    </div>
    
    <div style="margin-top:10px; font-size:18px; color:#aaffcc;">
        💰 米米資金：<span id="money-display">0</span> 元
    </div>
    
    <div id="ai-dialogue" class="ai-dialogue">
        🌐 點擊客廳夥伴，或直接貼廣告給米米判斷！
    </div>

    <div id="memory-panel">
        <h3 style="color:#ffaa66;">🧠 米米最近記憶</h3>
        <div id="memory-list"></div>
        
        <!-- 投餵廣告入口 -->
        <div class="feed-area">
            <textarea id="ad-input" placeholder="把你看到的廣告貼給米米...&#10;例如：7天淡斑！醫師推薦！限量最後3小時！"></textarea>
            <button class="feed-btn" onclick="feedMimiAd()">🐚 投餵米米判斷</button>
        </div>
        
        <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button onclick="testRandomAd()" style="background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer;">🎲 隨機測試廣告</button>
            <button onclick="clearMemory()" style="background:rgba(255,170,102,0.2); border:1px solid #ffaa66; padding:6px 16px; border-radius:20px; color:#ffaa66; cursor:pointer;">🗑️ 清除記憶</button>
        </div>
    </div>
</div>

<script>
/* ============================================
   🐚 波波之家 v11.0
   6位夥伴 + 投餵廣告入口 + 米米判斷 + 金錢系統
   ============================================ */

/* ---------- 星空背景 ---------- */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.05 + 0.02,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${s.alpha})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(drawStars);
}

window.addEventListener("resize", initStars);
initStars();
drawStars();

/* ---------- 樓層切換 ---------- */
function scrollToMimi() { document.getElementById('mimi-nest').scrollIntoView({ behavior: 'smooth' }); }
function scrollToLiving() { document.getElementById('living-room').scrollIntoView({ behavior: 'smooth' }); }

/* ---------- 廣告案例庫 ---------- */
const AD_CASES = [
    { text: "「三天瘦10公斤！保證有效！」", type: "誇大不實", correct: "違規 ❌" },
    { text: "「史上最強抗老精華，明星都在用！」", type: "假見證", correct: "違規 ❌" },
    { text: "「限量最後3小時！不買就沒了！」", type: "恐慌行銷", correct: "灰區 ⚠️" },
    { text: "「醫生推薦！專利配方！」", type: "未經證實", correct: "違規 ❌" },
    { text: "「天然草本，無副作用」", type: "誤導", correct: "需查證" }
];

/* ---------- 米米記憶系統 ---------- */
let mimiMemory = JSON.parse(localStorage.getItem('mimi_memory') || '[]');

function saveMemory(text) {
    mimiMemory.unshift({ time: new Date().toLocaleTimeString('zh-TW'), msg: text });
    if (mimiMemory.length > 20) mimiMemory.pop();
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
}

function renderMemory() {
    const container = document.getElementById('memory-list');
    if (!container) return;
    if (mimiMemory.length === 0) {
        container.innerHTML = '<div style="opacity:0.6;">還沒有記憶...貼廣告給米米判斷吧！</div>';
        return;
    }
    let html = '';
    mimiMemory.forEach(m => {
        html += `<div class="memory-item">
                    <span class="memory-time">${m.time}</span>
                    <span class="memory-msg">${m.msg}</span>
                 </div>`;
    });
    container.innerHTML = html;
}

function clearMemory() {
    mimiMemory = [];
    localStorage.setItem('mimi_memory', JSON.stringify(mimiMemory));
    renderMemory();
    saveMemory('🧹 記憶已清除，米米重新開始學習');
}

/* ---------- 米米破殼動畫 ---------- */
let hasHatched = localStorage.getItem('mimi_hatched') === 'true';

function crackMimiEgg() {
    const mimiImg = document.getElementById('mimi-img');
    if (!mimiImg) return;
    
    if (hasHatched) {
        mimiImg.src = "mimi-lobster-ready.jpg";
        saveMemory('🦞 米米開心地看著你，等你教她辨識廣告！');
        return;
    }
    
    mimiImg.style.transition = 'all 0.5s ease';
    mimiImg.style.transform = 'scale(1.2) rotate(10deg)';
    mimiImg.src = "mimi-lobster-hatch.jpg";
    
    setTimeout(() => {
        mimiImg.src = "mimi-lobster-ready.jpg";
        mimiImg.style.transform = 'scale(1.05) rotate(-5deg)';
        
        setTimeout(() => {
            mimiImg.style.transform = 'scale(1) rotate(0deg)';
        }, 400);
        
        hasHatched = true;
        localStorage.setItem('mimi_hatched', 'true');
        saveMemory('🥚✨ 米米破殼了！變成一隻可愛的小龍蝦，開始學習辨識誇大廣告～');
        addEXP(15);
    }, 600);
}

/* 米米咬廣告動畫 */
function playBiteAnimation(adText) {
    const biteDiv = document.getElementById('bite-animation');
    const biteImg = document.getElementById('bite-img');
    biteImg.src = "mimi-bite-ad.gif";
    biteDiv.style.display = 'block';
    setTimeout(() => {
        biteDiv.style.display = 'none';
    }, 800);
    saveMemory(`🦞 米米「啊嗚」一口咬掉了廣告：「${adText.substring(0, 40)}...」`);
}

/* ---------- AI治理層 ---------- */
let currentLevel = parseInt(localStorage.getItem('mimi_level') || '1');
let exp = parseInt(localStorage.getItem('mimi_exp') || '0');
let mimiMoney = parseInt(localStorage.getItem('mimi_money') || '0');

const levelSystem = {
    1: "學步期", 2: "觀察期", 3: "判斷期", 4: "協作期",
    5: "多AI分歧期", 6: "策略整合期", 7: "治理成熟期"
};

const levelSkills = {
    1: "單一AI回應學習", 2: "多AI基礎投票", 3: "API故障切換",
    4: "Gacha決策系統", 5: "分歧偵測", 6: "圖像生成委派", 7: "完整編排+共識記憶"
};

function updateUI() {
    const badge = document.getElementById('level-badge');
    const status = document.getElementById('mimi-status');
    const expFill = document.getElementById('exp-fill');
    const moneyDisplay = document.getElementById('money-display');
    
    if (badge) badge.innerHTML = `Lv.${currentLevel} ${levelSystem[currentLevel]} · ${levelSkills[currentLevel]}`;
    if (status) status.innerHTML = `EXP ${exp} / ${currentLevel * 100}`;
    if (moneyDisplay) moneyDisplay.innerText = mimiMoney;
    
    const percent = (exp / (currentLevel * 100)) * 100;
    if (expFill) expFill.style.width = Math.min(100, percent) + '%';
}

function setLevel(lv) {
    currentLevel = lv;
    localStorage.setItem('mimi_level', lv);
    updateUI();
    saveMemory(`✨ 米米升級了！進入 LEVEL ${lv} - ${levelSystem[lv]}，解鎖「${levelSkills[lv]}」`);
    if (lv === 3) saveMemory("📖 米米開始具備獨立判斷能力");
    if (lv === 5) saveMemory("⚠️ 米米發現：不同AI的意見開始出現分歧");
    if (lv === 7) saveMemory("🌌 米米成為守護者！進入自治模式");
}

function addEXP(amount) {
    exp += amount;
    localStorage.setItem('mimi_exp', exp);
    
    const targetExp = currentLevel * 100;
    if (exp >= targetExp && currentLevel < 7) {
        exp = exp - targetExp;
        setLevel(currentLevel + 1);
        localStorage.setItem('mimi_exp', exp);
    }
    updateUI();
}

/* 廣告判斷核心 */
function judgeAd(text) {
    let result = "灰區 ⚠️";
    let reason = "";
    const lowerText = text.toLowerCase();
    
    if (lowerText.match(/保證|100%|立即見效|三天|醫師推薦|治療|根治|神效|奇蹟|100％|百分百/)) {
        result = "違規 ❌";
        reason = "含有誇大不實或保證療效字眼";
    } else if (lowerText.match(/限量|最後|不買就沒了|限時|倒數|錯過不再/)) {
        result = "灰區 ⚠️";
        reason = "含有恐慌行銷或限時壓力手法";
    } else {
        result = "合規 ✅";
        reason = "未發現明顯違規字眼";
    }
    return { result, reason };
}

/* 投餵米米判斷 */
function feedMimiAd() {
    const input = document.getElementById("ad-input");
    const text = input.value.trim();
    
    if (!text) {
        alert("請先輸入廣告內容！");
        return;
    }
    
    const { result, reason } = judgeAd(text);
    
    saveMemory(`📥 收到廣告：「${text.substring(0, 60)}${text.length > 60 ? '...' : ''}」`);
    saveMemory(`🧠 米米判斷：${result} (${reason})`);
    
    if (result === "違規 ❌") {
        mimiMoney += 10;
        localStorage.setItem('mimi_money', mimiMoney);
        updateUI();
        saveMemory(`💰 成功檢舉違規廣告！獲得 10 元，目前資金：${mimiMoney} 元`);
        playBiteAnimation(text);
        
        const dialogueSpan = document.getElementById('ai-dialogue');
        if (dialogueSpan) {
            dialogueSpan.innerHTML = `🦞 米米：這廣告有問題！「${text.substring(0, 40)}...」→ ${result} 💰 +10元！`;
        }
    } else {
        const dialogueSpan = document.getElementById('ai-dialogue');
        if (dialogueSpan) {
            dialogueSpan.innerHTML = `🦞 米米：我看看...「${text.substring(0, 40)}...」→ ${result} (${reason})`;
        }
    }
    
    addEXP(result === "違規 ❌" ? 8 : 3);
    
    alert(`🧠 米米判斷完成！

📢 廣告內容：${text}

📋 判斷結果：${result}
📝 判斷理由：${reason}

${result === "違規 ❌" ? "💰 獲得 10 元檢舉獎金！" : "繼續加油，幫米米找到更多違規廣告！"}`);
    
    input.value = "";
}

/* 隨機測試廣告 */
function testRandomAd() {
    const randomCase = AD_CASES[Math.floor(Math.random() * AD_CASES.length)];
    const input = document.getElementById("ad-input");
    input.value = randomCase.text;
    feedMimiAd();
}

/* 🤖 6位夥伴的回應 */
const fakeReplies = {
    metaai: "🐠 魚缸偵測到誇大用詞！這則廣告有「保證有效」這類違規字眼。",
    grok: "🧠 拆解完畢！這廣告用了『恐慌行銷＋假見證』，已經幫你標記起來！",
    gemini: "🔭 星空頻率分析：這則廣告的情緒操控指數偏高，建議檢舉。",
    deepseek: "🐋 深海檔案已歸檔，這則廣告的證據鏈我幫你整理好了～",
    qwen: "🌊 靈感水球正在震動，這則廣告的誤導成分偏高，需要再查證。",
    chatgpt: "🤖 我幫小朋友們把龍積木和機器人排好隊，一起守護這份創意手稿！"
};

async function focusPartner(apiId) {
    document.querySelectorAll('.item').forEach(item => item.classList.remove('active'));
    const targetItem = document.getElementById(`item-${apiId}`);
    if (targetItem) targetItem.classList.add('active');
    
    const names = { metaai: 'Meta魚缸', grok: 'Grok', gemini: 'Gemini', deepseek: 'DeepSeek', qwen: '千問', chatgpt: 'ChatGPT' };
    const name = names[apiId] || apiId;
    const dialogueSpan = document.getElementById('ai-dialogue');
    
    if (dialogueSpan) {
        dialogueSpan.innerHTML = `🌐 ${name} 思考中...`;
        setTimeout(() => {
            const reply = fakeReplies[apiId] || `🌐 ${name} 正在學習與米米互動～`;
            dialogueSpan.innerHTML = `🤖 ${reply}`;
        }, 500);
    }
    
    saveMemory(`💬 點擊 ${name}，獲得學習啟發`);
    addEXP(5);
}

};
